<script>
// ── Firebase compat (no ES modules needed) ────────────────────────────────────
// Shim modular API names to compat API so existing code works unchanged
function _initApp(cfg, name){
  // Delete existing app with same name if exists
  try{ firebase.app(name).delete(); }catch(e){}
  return firebase.initializeApp(cfg, name);
}
function collection(db, name){ return db.collection(name); }
function doc(db, col, id){ return db.collection(col).doc(id); }
function getDocs(ref){ return ref.get(); }
function setDoc(ref, data, opts){ return opts&&opts.merge ? ref.set(data,{merge:true}) : ref.set(data); }
function addDoc(ref, data){ return ref.add(data); }
function deleteDoc(ref){ return ref.delete(); }
function updateDoc(ref, data){ return ref.update(data); }
function onSnapshot(ref, cb, errCb){ return ref.onSnapshot(cb, errCb); }
function query(ref, ...args){ let q=ref; args.forEach(a=>{ if(a&&a._ob) q=q.orderBy(a._f,a._d); }); return q; }
function orderBy(field, dir='asc'){ return {_ob:true,_f:field,_d:dir}; }
function getFirestore(app){ return app.firestore(); }

function filterPrefix(){ return filterYear+'-'+String(filterMonth).padStart(2,'0'); }

  if(!dateStr) return false;

const bInc=(bid,pEntries)=>{

  return entInc+txnInc+allInc;
};
const bMatSale=(bid,pEntries)=>(pEntries||entries).filter(e=>e.branch_id===bid&&inPeriod(e.date)).reduce((s,e)=>s+(e.material||0),0);
const bServiceInc=(bid,pEntries)=>(pEntries||entries).filter(e=>e.branch_id===bid&&inPeriod(e.date)).reduce((s,e)=>s+(e.online||0)+(e.cash||0),0);
const bSt=bid=>staff.filter(s=>s.branch_id===bid);
// Period-aware: staff who worked at this branch in the current filter period
// Used in salary calculations and display
function bStPeriod(bid){
  const mon = filterMode==='month' ? filterPrefix() : (filterYear+'-'+String(NOW.getMonth()+1).padStart(2,'0'));
  return staff.filter(function(s){
    if(s.branch_id!==bid) return false;
    // Include if they were active or partial in that month
    const sts = staffStatusForMonth(s, mon);
    return sts.status !== 'inactive';
  });
}
const bEnt=bid=>entries.filter(e=>e.branch_id===bid);
const bExp=(bid,overrideMonths)=>{
  const b=branches.find(x=>x.id===bid);if(!b)return 0;
  // Determine which months to sum
  let months=[];
  if(overrideMonths){ months=overrideMonths; }
  else if(filterMode==='month'){ months=[filterPrefix()]; }
  else { months=activeMonthsInYear(filterYear); } // year: only active months

  // Pro-rata salary per month
  const sal=months.reduce((total,mon)=>{
    return total+bSt(bid).reduce((s,st)=>s+proRataSalary(st,mon),0);
  },0);

  const periodEntries=entries.filter(e=>e.branch_id===bid&&inPeriod(e.date));
  const incentives=periodEntries.reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
  const cash=periodEntries.reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.petrol||0),0);
  const matExp=periodEntries.reduce((s,e)=>s+(e.mat_expense||0),0);

  // Monthly fixed expenses (rent/elec/wifi/water) — per month from monthlyExpenses collection
  const fixedTotal=months.reduce((total,mon)=>{
    const mf=getMonthlyFixed(bid,mon);
    return total+(mf.shop_rent+mf.room_rent+mf.shop_elec+mf.room_elec+mf.wifi+mf.water);
  },0);

  // Branch txns
  const bTxns=transactions.filter(t=>t.branch_id===bid&&inPeriod(t.date||t.month+'-01'));
  const txnTotal=bTxns.reduce((s,t)=>t.cat==='income'?s-(t.amount||0):s+(t.amount||0),0);
  const allTxns=transactions.filter(t=>t.branch_id==='all'&&inPeriod(t.date||t.month+'-01'));
  const allSplit=branches.length>0?allTxns.reduce((s,t)=>t.cat==='income'?s-(t.amount||0):s+(t.amount||0),0)/branches.length:0;
  // Cost centers: split per active month, per branch
  const activeMthCount = months.length || 1;
  const ccTotal = costCenters.reduce((s,cc)=>s+(cc.monthly_cost||0),0) / Math.max(branches.length,1) * activeMthCount;

  return sal+incentives+cash+matExp+fixedTotal+txnTotal+allSplit+ccTotal;
};
const sInc=sid=>entries.filter(e=>inPeriod(e.date)).reduce((sum,e)=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===sid);return sum+(sb?sb.incentive||0:0);},0);

// Get monthly fixed expense for a branch+month — falls back to branch defaults
function getMonthlyFixed(bid, monthStr){
  const rec = monthlyExpenses.find(function(m){return m.branch_id===bid && m.month===monthStr;});
  const b = branches.find(function(x){return x.id===bid;});
  if(!b) return {shop_rent:0,room_rent:0,shop_elec:0,room_elec:0,wifi:0,water:0};
  function fv(recVal, branchVal){ 
    if(rec && recVal !== undefined && recVal !== null) return recVal;
    return branchVal || 0;
  }
  return {
    shop_rent: fv(rec && rec.shop_rent, b.shop_rent),
    room_rent: fv(rec && rec.room_rent, b.room_rent),
    shop_elec: fv(rec && rec.shop_elec, b.shop_elec),
    room_elec: fv(rec && rec.room_elec, b.room_elec),
    wifi:      fv(rec && rec.wifi,      b.wifi),
    water:     fv(rec && rec.water,     b.water),
  };
}

// Get all months in year that have business activity (entries or transactions)
// For current year: Jan to current month (includes months with no data yet — fixed costs still apply)
// For past years: only months with actual entries (business was running)
function activeMonthsInYear(year){
  const currentYear = NOW.getFullYear();
  const currentMonth = NOW.getMonth() + 1; // 1-based
  
  if(year === currentYear){
    // Current year: Jan to current month (all months up to now)
    const months = [];
    for(var m = 1; m <= currentMonth; m++){
      months.push(year + '-' + String(m).padStart(2,'0'));
    }
    return months;
  } else {
    // Past/future year: only months that have actual entries or transactions
    const months = new Set();
    entries.forEach(function(e){ 
      if(e.date && e.date.startsWith(String(year)+'-')) months.add(e.date.slice(0,7)); 
    });
    transactions.forEach(function(t){ 
      var d = t.date || (t.month ? t.month+'-01' : null); 
      if(d && d.startsWith(String(year)+'-')) months.add(d.slice(0,7)); 
    });
    monthlyExpenses.forEach(function(m){
      if(m.month && m.month.startsWith(String(year)+'-')) months.add(m.month);
    });
    return Array.from(months).sort();
  }
}

// Salary history lookup: returns the salary that was in effect for a given month
function getStaffSalaryForMonth(sid, monthStr){
  // salary_history records: {staff_id, salary, effective_from (YYYY-MM), branch_id, note}
  // Find the latest record with effective_from <= monthStr
  const records = salaryHistory.filter(function(r){ return r.staff_id===sid && r.effective_from<=monthStr; });
  if(records.length === 0){
    // Fall back to current staff.salary
    const st = staff.find(function(x){return x.id===sid;});
    return st ? (st.salary||0) : 0;
  }
  // Sort desc by effective_from, take first
  records.sort(function(a,b){ return b.effective_from.localeCompare(a.effective_from); });
  return records[0].salary || 0;
}

// Get branch for staff in a given month (from history)
function getStaffBranchForMonth(sid, monthStr){
  const records = salaryHistory.filter(function(r){ return r.staff_id===sid && r.effective_from<=monthStr && r.branch_id; });
  if(records.length === 0){
    const st = staff.find(function(x){return x.id===sid;});
    return st ? (st.branch_id||'') : '';
  }
  records.sort(function(a,b){ return b.effective_from.localeCompare(a.effective_from); });
  return records[0].branch_id || '';
}

// Pro-rata salary: if staff has exit_date or join mid-month, calculate working days
function proRataSalary(st, monthStr){
  const salary = getStaffSalaryForMonth(st.id, monthStr);
  if(!salary) return 0;
  const [yr, mo] = monthStr.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();

  // Weekly offs: 2 per week
  const weeklyOffs = Math.floor(daysInMonth / 7) * 2 + (daysInMonth % 7 >= 6 ? 1 : 0);
  // Total working days in month (after weekly offs)
  const workingDays = daysInMonth - weeklyOffs;

  // Paid leave: 2 days for Men's branch, 3 days for Unisex branch
  const branch = branches.find(b => b.id === st.branch_id);
  const paidLeave = branch && branch.type === 'unisex' ? 3 : 2;

  const monthStart = new Date(yr, mo-1, 1);
  const monthEnd   = new Date(yr, mo, 0);

  const joinDate = st.join ? new Date(st.join) : null;
  const exitDate = st.exit_date ? new Date(st.exit_date) : null;

  // Staff worked full month — salary = working_days + paid_leave / working_days
  // i.e. paid leave is ADDED to effective days worked (it's paid!)
  if((!joinDate || joinDate <= monthStart) && (!exitDate || exitDate >= monthEnd)){
    // Full month: effective = workingDays + paidLeave, but can't exceed workingDays
    // Paid leave is already included in the salary — return full salary
    return salary;
  }

  // Pro-rata: partial month (joined or exited mid-month)
  const effectiveStart = (joinDate && joinDate > monthStart) ? joinDate : monthStart;
  const effectiveEnd   = (exitDate && exitDate < monthEnd)   ? exitDate : monthEnd;

  if(effectiveStart > effectiveEnd) return 0;

  // Calendar days worked in period
  const calDays = Math.round((effectiveEnd - effectiveStart) / 86400000) + 1;
  // Weekly offs proportional to period
  const periodOffs = Math.floor(calDays / 7) * 2 + (calDays % 7 >= 6 ? 1 : 0);
  // Actual working days in period
  const periodWorkDays = Math.max(0, calDays - periodOffs);
  // Add pro-rata paid leave: proportional to period vs full month
  const proPaidLeave = Math.round(paidLeave * calDays / daysInMonth);
  // Effective payable days = working days + paid leave
  const payableDays = Math.min(periodWorkDays + proPaidLeave, workingDays + paidLeave);

  // Total payable basis = workingDays + paidLeave (full month denominator)
  const fullPayBasis = workingDays + paidLeave;

  return Math.round(salary * payableDays / fullPayBasis);
}

// Last month billing/incentive for a staff member
function lastMonthData(sid){
  const now=new Date();
  const lmYear=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
  const lmMonth=now.getMonth()===0?12:now.getMonth(); // 1-based
  const prefix=lmYear+'-'+String(lmMonth).padStart(2,'0');
  const lmEntries=entries.filter(e=>e.date&&e.date.startsWith(prefix));
  let billing=0,incentive=0;
  lmEntries.forEach(e=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===sid);if(sb){billing+=(sb.billing||0);incentive+=(sb.incentive||0);}});
  return {billing,incentive,achieved:billing};
}

  // Income breakdown
  const periodEnts = entries.filter(function(e){return e.branch_id===bid&&inPeriod(e.date);});
  const serviceInc = periodEnts.reduce(function(s,e){return s+(e.online||0)+(e.cash||0);},0);
  const matSaleInc = periodEnts.reduce(function(s,e){return s+(e.material||0);},0);
  const txnInc = transactions.filter(function(t){return t.branch_id===bid&&t.cat==='income'&&inPeriod(t.date||t.month+'-01');}).reduce(function(s,t){return s+(t.amount||0);},0);
  const totalInc = bInc(bid);

  // Expense breakdown
  const incentives = periodEnts.reduce(function(s,e){return s+(e.staff_billing||[]).reduce(function(ss,sb){return ss+(sb.incentive||0);},0);},0);
  const matExp = periodEnts.reduce(function(s,e){return s+(e.mat_expense||0);},0);
  const otherCash = periodEnts.reduce(function(s,e){return s+(e.tips||0)+(e.others||0)+(e.petrol||0);},0);
  const txnExp = transactions.filter(function(t){return t.branch_id===bid&&t.cat!=='income'&&inPeriod(t.date||t.month+'-01');}).reduce(function(s,t){return s+(t.amount||0);},0);

  // Per-month fixed + salary

    return {mon:mon, label:MNAMES[mm], sal:sal, fixed:mFixed, mf:mf, inc:mInc};
  });
  const totalFixed = perMonth.reduce(function(s,p){return s+p.fixed;},0);

      html += '<td class="num '+(p.inc>0?'green':'')+'">'+(p.inc>0?INR(p.inc):'—')+'</td>';
      html += '<td class="num">'+INR(rent)+'</td>';
      html += '<td class="num">'+INR(elec)+'</td>';
      html += '<td class="num">'+INR(ww)+'</td>';
      html += '<td class="num" style="color:var(--gold)">'+INR(p.sal)+'</td>';
      html += '<td class="num '+(pnl>=0?'green':'red')+'" style="font-weight:500">'+(isAdm()?(pnl>=0?INR(pnl):'('+INR(-pnl)+')'):MASK)+'</td>';
      html += '</tr>';
    });
    html += '<tr class="tf"><td>TOTAL</td><td class="num">'+INR(yearTotInc)+'</td><td colspan="3" class="num">'+INR(yearTotFix)+'</td><td class="num" style="color:var(--gold)">'+INR(yearTotSal)+'</td>';
    const yearNet = yearTotInc-totalExp;
    html += '<td class="num '+(yearNet>=0?'green':'red')+'">'+( isAdm()?(yearNet>=0?INR(yearNet):'('+INR(-yearNet)+')'):MASK )+'</td></tr>';
    html += '</tbody></table></div>';
  }

  // Active staff
  const bActiveStaff = brS.filter(function(s){return activeStaffIds.has(s.id);});
  if(bActiveStaff.length>0){
    html += '<div style="font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Active Staff ('+bActiveStaff.length+')</div>';
    html += '<div class="card"><table>';
    html += '<thead><tr><th>Name</th><th>Role</th><th class="num">Target</th><th class="num">Billing</th><th class="num">Incentive</th></tr></thead><tbody>';
    bActiveStaff.forEach(function(s){
      const billing = periodEnts.reduce(function(sum,e){const sb=(e.staff_billing||[]).find(function(x){return x.staff_id===s.id;});return sum+(sb?sb.billing||0:0);},0);
      const inc2 = sInc(s.id);
      const pct = Math.min(Math.round(billing/(s.target||50000)*100),100);
      html += '<tr><td style="font-weight:500">'+s.name+'</td><td><span class="pill pb" style="font-size:10px">'+s.role+'</span></td>'+
        '<td class="num">'+INR(s.target||0)+'</td>'+
        '<td class="num" style="font-weight:500">'+INR(billing)+'</td>'+
        '<td class="num" style="color:var(--green)">'+INR(inc2)+'</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  document.getElementById('dbm-title').textContent = b.name+' — '+b.location;
  document.getElementById('dbm-period').textContent = periodLabel()+(isYear?' ('+months.length+' months)':'');
  document.getElementById('dbm-body').innerHTML = html;
  document.getElementById('dash-branch-modal').style.display = 'flex';
}

function buildFixedCostsTable(bid, brS){
  const months = filterMode==='month' ? [filterPrefix()] : activeMonthsInYear(filterYear);
  const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isYear = filterMode==='year' && months.length > 1;

  // Build per-month data
  const perMonth = months.map(function(mon){
    const mf = getMonthlyFixed(bid, mon);
    const salaryThisMonth = brS.reduce((s,st)=>s+proRataSalary(st,mon), 0);
    const hasCustom = monthlyExpenses.some(function(m){return m.branch_id===bid&&m.month===mon;});
    const mm = parseInt(mon.split('-')[1])-1;
    return {mon:mon, label:MNAMES[mm], mf:mf, salary:salaryThisMonth, custom:hasCustom,
      fixedSub: mf.shop_rent+mf.room_rent+mf.shop_elec+mf.room_elec+mf.wifi+mf.water};
  });

  const totalFixed = perMonth.reduce((s,p)=>s+p.fixedSub, 0);
  const totalSalary = perMonth.reduce((s,p)=>s+p.salary, 0);
  const grandTotal = totalFixed + totalSalary;
  const mLabel = months.length+' month'+(months.length>1?'s':'');
  const customCount = perMonth.filter(function(p){return p.custom;}).length;

  var html = '<div class="card" style="overflow-x:auto">';

  if(isYear){
    // ── YEAR MODE: full month-by-month breakdown table ──────────────────────
    // Columns: Item | Jan | Feb | Mar | ... | Total
    var thCols = '<th style="background:var(--bg4);color:var(--text2);font-size:10px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap">Item</th>';
    perMonth.forEach(function(p){
      var custDot = p.custom ? '<span style="color:var(--gold);font-size:8px"> ●</span>' : '';
      thCols += '<th style="background:var(--bg4);color:var(--text2);font-size:10px;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap">'+p.label+custDot+'</th>';
    });
    thCols += '<th style="background:var(--bg4);color:var(--gold);font-size:10px;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap">Total</th>';

    function makeRow(label, getter, highlight){
      var total = 0;
      var tds = perMonth.map(function(p){ var v=getter(p); total+=v; return '<td style="padding:6px 8px;text-align:right;font-size:12px;border-bottom:1px solid var(--border)">'+(v>0?INR(v):'—')+'</td>'; }).join('');
      var totalStyle = highlight ? 'color:var(--gold);font-weight:600' : 'font-weight:500';
      return '<tr><td style="padding:6px 10px;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap">'+label+'</td>'+tds+'<td style="padding:6px 8px;text-align:right;font-size:12px;border-bottom:1px solid var(--border);'+totalStyle+'">'+INR(total)+'</td></tr>';
    }

    var rows = '';
    rows += makeRow('Shop Rent',       function(p){return p.mf.shop_rent;});
    rows += makeRow('Room Rent',       function(p){return p.mf.room_rent;});
    rows += makeRow('Shop Electricity',function(p){return p.mf.shop_elec;});
    rows += makeRow('Room Electricity',function(p){return p.mf.room_elec;});
    rows += makeRow('WiFi',            function(p){return p.mf.wifi;});
    var hasWater = perMonth.some(function(p){return p.mf.water>0;});
    if(hasWater) rows += makeRow('Water', function(p){return p.mf.water;});

    // Fixed sub-total row
    var fixedTds = perMonth.map(function(p){return '<td style="padding:5px 8px;text-align:right;font-size:11px;color:var(--text3);background:var(--bg4);border-bottom:1px solid var(--border)">'+INR(p.fixedSub)+'</td>';}).join('');
    rows += '<tr><td style="padding:5px 10px;font-size:10px;color:var(--text3);background:var(--bg4);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Fixed Sub-total</td>'+fixedTds+'<td style="padding:5px 8px;text-align:right;font-size:11px;font-weight:600;background:var(--bg4);border-bottom:1px solid var(--border)">'+INR(totalFixed)+'</td></tr>';

    // Salary row (pro-rata per month)
    var salTds = perMonth.map(function(p){return '<td style="padding:6px 8px;text-align:right;font-size:12px;color:var(--gold);border-bottom:1px solid var(--border)">'+INR(p.salary)+'</td>';}).join('');
    rows += '<tr><td style="padding:6px 10px;font-size:12px;color:var(--gold);border-bottom:1px solid var(--border);white-space:nowrap">Total Salary <span style="font-size:9px;color:var(--text3)">(pro-rata)</span></td>'+salTds+'<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:700;color:var(--gold);border-bottom:1px solid var(--border)">'+INR(totalSalary)+'</td></tr>';

    // Grand total row
    var gtTds = perMonth.map(function(p){return '<td style="padding:7px 8px;text-align:right;font-size:12px;font-weight:600;background:rgba(192,146,45,.08)">'+INR(p.fixedSub+p.salary)+'</td>';}).join('');
    rows += '<tr><td style="padding:7px 10px;font-weight:700;font-size:12px;background:rgba(192,146,45,.08)">Grand Total</td>'+gtTds+'<td style="padding:7px 8px;text-align:right;font-size:14px;font-weight:700;color:var(--gold);background:rgba(192,146,45,.08)">'+INR(grandTotal)+'</td></tr>';

    html += '<table><thead><tr>'+thCols+'</tr></thead><tbody>'+rows+'</tbody></table>';
    if(customCount>0) html += '<div style="padding:6px 12px;font-size:10px;color:var(--gold)">● = custom value set for that month</div>';

  } else {
    // ── MONTH MODE: simple single-column view ────────────────────────────────
    const p = perMonth[0] || {mf:{shop_rent:0,room_rent:0,shop_elec:0,room_elec:0,wifi:0,water:0},salary:0,fixedSub:0,custom:false};
    const src = p.custom
      ? '<span style="font-size:9px;background:rgba(192,146,45,.1);color:var(--gold);padding:1px 5px;border-radius:3px;border:1px solid rgba(192,146,45,.3)">custom</span>'
      : '<span style="font-size:9px;color:var(--text3)">default</span>';
    var rows = '';
    rows += '<tr><td>Shop Rent</td><td class="num">'+INR(p.mf.shop_rent)+'</td><td>'+src+'</td></tr>';
    rows += '<tr><td>Room Rent</td><td class="num">'+INR(p.mf.room_rent)+'</td><td>'+src+'</td></tr>';
    rows += '<tr><td>Shop Electricity</td><td class="num">'+INR(p.mf.shop_elec)+'</td><td>'+src+'</td></tr>';
    rows += '<tr><td>Room Electricity</td><td class="num">'+INR(p.mf.room_elec)+'</td><td>'+src+'</td></tr>';
    rows += '<tr><td>WiFi</td><td class="num">'+INR(p.mf.wifi)+'</td><td>'+src+'</td></tr>';
    if(p.mf.water>0) rows += '<tr><td>Water</td><td class="num">'+INR(p.mf.water)+'</td><td>'+src+'</td></tr>';
    rows += '<tr style="background:var(--bg5)"><td colspan="3" style="padding:4px 11px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">Fixed sub-total: '+INR(p.fixedSub)+'</td></tr>';
    rows += '<tr class="tf" style="color:var(--gold)"><td>Total Salary <span style="font-size:9px;color:var(--text3);font-weight:400">(1 month)</span></td><td class="num" style="color:var(--gold)">'+INR(p.salary)+'</td><td><span style="font-size:9px;color:var(--text3)">pro-rata</span></td></tr>';
    rows += '<tr style="background:rgba(192,146,45,.08)"><td style="font-weight:600;font-size:12px">Grand Total</td><td class="num" style="font-size:14px;font-weight:700;color:var(--gold)">'+INR(grandTotal)+'</td><td></td></tr>';
    html += '<table><thead><tr><th>Item</th><th class="num">'+periodLabel()+'</th><th style="font-size:10px;color:var(--text3)">Source</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  html += '</div>';
  return html;
}

    }).join('')||'<tr><td colspan="6" style="text-align:center;padding:12px;color:#666">No entries</td></tr>'}</tbody></table></div></div>
    <div><div class="st">Staff & targets</div>
    <div class="card"><table><thead><tr><th>Name</th><th>Role</th><th class="num">Target</th><th class="num">Progress</th></tr></thead>
    <tbody>${brS.map(s=>{const ach=sInc(s.id)*10,tgt=s.target||50000,pct=Math.min(Math.round(ach/tgt*100),100);

// STAFF
// Helper: get staff status for a given month
// Count approved leaves for a staff member in a given month string (YYYY-MM)
function staffLeavesInMonth(sid, monthStr){
  return leaves.filter(function(l){
    return l.staff_id===sid && l.status==='approved' && l.date && l.date.startsWith(monthStr);
  }).reduce(function(s,l){return s+(l.days||1);}, 0);
}

function staffStatusForMonth(st, monthStr){
  const [yr, mo] = monthStr.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const monthStart = new Date(yr, mo-1, 1);
  const monthEnd   = new Date(yr, mo, 0);
  const joinDate = st.join ? new Date(st.join) : null;
  const exitDate = st.exit_date ? new Date(st.exit_date) : null;

  // Completely inactive this month
  if(joinDate && joinDate > monthEnd) return {status:'inactive', daysWorked:0};
  if(exitDate && exitDate < monthStart) return {status:'inactive', daysWorked:0};

  // Full month active
  if((!joinDate || joinDate <= monthStart) && (!exitDate || exitDate >= monthEnd)){
    return {status:'active', daysWorked:daysInMonth};
  }

  // Partial month
  const effStart = (joinDate && joinDate > monthStart) ? joinDate : monthStart;
  const effEnd   = (exitDate && exitDate < monthEnd)   ? exitDate : monthEnd;
  const calDays  = Math.round((effEnd - effStart) / 86400000) + 1;
  const offDays  = Math.floor(calDays/7)*2 + (calDays%7>=6?1:0);
  const worked   = Math.max(0, calDays - offDays);
  return {status:'partial', daysWorked:worked, calDays:calDays, joinedOn:st.join, exitedOn:st.exit_date};
}

// Overall staff status — optionally check against a specific month (YYYY-MM)
// If no month given, checks against today
function staffOverallStatus(st, forMonth){
  if(!st.exit_date) return 'active';
  const exit = new Date(st.exit_date);
  // Compare against end of the given month, or today
  let refDate;
  if(forMonth){
    const [yr,mo] = forMonth.split('-').map(Number);
    refDate = new Date(yr, mo-1, 1); // start of that month
    // If exit is BEFORE the start of this month → was already inactive
    return exit < refDate ? 'inactive' : 'active';
  }
  // Default: compare against today
  return exit < new Date() ? 'inactive' : 'active';
}

          const mons=activeMonthsInYear(filterYear);
          return INR(filtered.reduce((t,st)=>t+mons.reduce((m,mon)=>m+proRataSalary(st,mon),0),0));
        })():INR(filtered.reduce((t,st)=>t+proRataSalary(st,filterPrefix()),0))}</td>

      </tr>
    </tfoot>

}

async function saveSt(){

  const bid=document.getElementById('sf-branch').value;
  if(!name||!bid){toast('Name and branch required','error');return;}
  const eid=document.getElementById('sf-eid').value;
  const ex=eid?staff.find(x=>x.id===eid):null;
  const s={
    name,branch_id:bid,
    role:document.getElementById('sf-role').value,
    mobile:document.getElementById('sf-mobile').value,
    target:parseFloat(document.getElementById('sf-tgt').value||0),
    join:document.getElementById('sf-join').value,
    salary:isAdm()?parseFloat(document.getElementById('sf-sal').value||0):(ex?ex.salary||0:0),
    incentive_pct:isAdm()?parseFloat(document.getElementById('sf-inc-pct').value||10):(ex?ex.incentive_pct!==undefined?ex.incentive_pct:10:10),
    exit_date:document.getElementById('sf-exit')?.value||null,

  try{

// Step 3: confirm — save with proper date
async function confirmStatusChange(sid, currentStatus){
  const s = staff.find(function(x){return x.id===sid;});
  if(!s) return;
  const dateEl = document.getElementById('status-date-'+sid);
  const chosenDate = dateEl ? dateEl.value : new Date().toISOString().slice(0,10);
  if(!chosenDate){toast('Please select a date','error');return;}

  const isActive = currentStatus==='active';
  const logEntry = {
    staff_id: sid,
    staff_name: s.name,
    action: isActive ? 'inactive' : 'active',
    date: chosenDate,
    recorded_by: currentUser.id,
    recorded_at: new Date().toISOString()
  };

  if(isActive){
    // Mark inactive: set exit_date to chosen date
    await setDoc(doc(db,'staff',sid),{exit_date:chosenDate},{merge:true});
    await addDoc(collection(db,'staff_status_log'), logEntry);
    toast(s.name+' marked inactive from '+chosenDate,'success');
  } else {
    // Mark active: clear exit_date, record re-join
    await setDoc(doc(db,'staff',sid),{exit_date:null,join:chosenDate},{merge:true});
    await addDoc(collection(db,'staff_status_log'), logEntry);
    toast(s.name+' re-activated from '+chosenDate,'success');
  }
  const row = document.getElementById('status-date-row-'+sid);
  if(row) row.style.display='none';
}
window.confirmStatusChange=confirmStatusChange;

function handleSalInput(el){
  var fn=el.dataset.calcfn;
  var sid=el.dataset.sid;
  if(fn==='inc') calcIncrement(sid);
  else if(fn==='lump') calcIncrementFromLump(sid);
  else if(fn==='pct') calcIncrementFromPct(sid);
}
window.handleSalInput=handleSalInput;

function calcIncrement(sid){
  const s=staff.find(function(x){return x.id===sid;});if(!s)return;
  const newSal=parseFloat(document.getElementById('shi-sal').value)||0;
  const cur=s.salary||0;
  const diff=newSal-cur;
  const pct=cur>0?Math.round(diff/cur*100):0;
  document.getElementById('shi-preview').textContent='₹'+newSal.toLocaleString('en-IN');
  document.getElementById('shi-pct-preview').textContent=(diff>=0?'+':'')+pct+'%';
  document.getElementById('shi-pct-preview').style.color=diff>=0?'var(--green)':'var(--red)';
  // Sync lump and pct inputs
  const lEl=document.getElementById('shi-inc');
  const pEl=document.getElementById('shi-pct');
  if(lEl) lEl.value=diff||'';
  if(pEl) pEl.value=pct||'';
}

function calcIncrementFromLump(sid){
  const s=staff.find(function(x){return x.id===sid;});if(!s)return;
  const lump=parseFloat(document.getElementById('shi-inc').value)||0;
  const newSal=(s.salary||0)+lump;
  document.getElementById('shi-sal').value=newSal;
  calcIncrement(sid);
}

function calcIncrementFromPct(sid){
  const s=staff.find(function(x){return x.id===sid;});if(!s)return;
  const pct=parseFloat(document.getElementById('shi-pct').value)||0;
  const newSal=Math.round((s.salary||0)*(1+pct/100));
  document.getElementById('shi-sal').value=newSal;
  calcIncrement(sid);
}
window.calcIncrement=calcIncrement;
window.calcIncrementFromLump=calcIncrementFromLump;
window.calcIncrementFromPct=calcIncrementFromPct;

async function saveSalaryHistory(sid_or_el){
  const sid=typeof sid_or_el==='string'?sid_or_el:(sid_or_el&&sid_or_el.dataset?sid_or_el.dataset.sid:sid_or_el);
  if(!isAdm()){toast('Admin only','error');return;}
  const s=staff.find(function(x){return x.id===sid;});if(!s)return;
  const yEl=document.getElementById('shi-year');
  const mEl=document.getElementById('shi-mon');
  const y=yEl?yEl.value:NOW.getFullYear();
  const m=mEl?String(mEl.value).padStart(2,'0'):String(NOW.getMonth()+1).padStart(2,'0');
  const effFrom=y+'-'+m;
  const newSal=parseFloat(document.getElementById('shi-sal').value)||0;
  const branch=document.getElementById('shi-branch').value;
  const note=document.getElementById('shi-note').value||'';
  if(!newSal){toast('Enter a valid salary','error');return;}

  // Save to salary_history
  const rec={staff_id:sid,salary:newSal,effective_from:effFrom,branch_id:branch,note,saved_by:currentUser.id,saved_at:new Date().toISOString()};
  await addDoc(collection(db,'salary_history'),rec);

  // Also update staff.salary to current salary (if effective_from <= today)
  const today=NOW.getFullYear()+'-'+String(NOW.getMonth()+1).padStart(2,'0');
  if(effFrom<=today){
    await setDoc(doc(db,'staff',sid),{salary:newSal,branch_id:branch},{merge:true});
    toast('Salary updated to '+INR(newSal)+' from '+effFrom,'success');
  } else {
    toast('Salary change saved for '+effFrom,'success');
  }
  showStaffSalaryModal(sid); // Refresh
}

    branches.forEach(function(b,i){

        '<td class="num"><input id="ef-srent-'+b.id+'" type="number" value="'+mf.shop_rent+'" style="'+sty+'" '+(isAdm()?'':'disabled')+' data-calcrow="rent" data-calcbid="'+b.id+'"'+'></td>'+
        '<td class="num"><input id="ef-rrent-'+b.id+'" type="number" value="'+mf.room_rent+'" style="'+sty+'" '+(isAdm()?'':'disabled')+' data-calcrow="rent" data-calcbid="'+b.id+'"'+'></td>'+
        '<td class="num" style="font-weight:600;color:var(--gold)" id="ef-rowtotal-rent-'+b.id+'">'+INR(t)+'</td><td class="num">'+INR(inc)+'</td><td class="num '+(pct>100?'red':pct>60?'orange':'')+'">'+( isAdm()?pct+'%':MASK)+'</td>'+
        '<td><span class="pill '+pc+'">'+(pct>100?'Critical':pct>60?'High':'OK')+'</span></td>'+

    if(!isAdm()) rows2+='<tr><td colspan="8" style="padding:10px;font-size:11px;color:var(--red);background:var(--red-bg)">Admin login required to view and edit</td></tr>';
  } else if(tab==='elec'){
    hdr='<tr><th>#</th><th>Branch</th><th class="num">Shop Elec</th><th class="num">Room Elec</th><th class="num">Total</th>'+(isAdm()?'<th></th>':'')+'</tr>';
    branches.forEach(function(b,i){

        '<td class="num"><input id="ef-selec-'+b.id+'" type="number" value="'+mf.shop_elec+'" style="'+sty+'" '+(isAdm()?'':'disabled')+' data-calcrow="elec" data-calcbid="'+b.id+'"'+'></td>'+
        '<td class="num"><input id="ef-relec-'+b.id+'" type="number" value="'+mf.room_elec+'" style="'+sty+'" '+(isAdm()?'':'disabled')+' data-calcrow="elec" data-calcbid="'+b.id+'"'+'></td>'+
        '<td class="num" style="font-weight:600;color:var(--gold)" id="ef-rowtotal-elec-'+b.id+'">'+INR(mf.shop_elec+mf.room_elec)+'</td>'+
        (isAdm()?'<td><button class="btn btn-g btn-sm" data-bid="'+b.id+'" data-mon="'+expMon+'" data-fn="saveExpElec">Save</button>'+(hasC?' <button class="btn btn-d btn-sm" data-bid="'+b.id+'" data-mon="'+expMon+'" data-fn="clearMonthlyFixed">Reset</button>':'')+'</td>':'')+

  return picker+'<div class="card" style="overflow-x:auto"><table><thead>'+hdr+'</thead><tbody>'+rows2+'</tbody></table></div>';

function buildSalaryExpTab(){
  const expMon = window._salExpMonth || filterPrefix();
  const expViewMode = window._salExpView || 'month';
  const selBranch = window._salExpBranch || '';
  const isYearView = expViewMode === 'year';
  const months2s = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const years2s = [];
  for(var y = NOW.getFullYear(); y >= 2023; y--) years2s.push(y);
  const [seyy, semm] = expMon.split('-').map(Number);

  // Year mode: use all months up to current if current year, else all 12
  const maxM = isYearView ? (seyy === NOW.getFullYear() ? NOW.getMonth() + 1 : 12) : semm;
  const salMonths = isYearView
    ? (function(){ var a=[]; for(var m=1;m<=maxM;m++) a.push(seyy+'-'+String(m).padStart(2,'0')); return a; })()
    : [expMon];

  // Build pickers
  var yearOpts = '';
  years2s.forEach(function(y){ yearOpts += '<option value="'+y+'"'+(y===seyy?' selected':'')+'>'+y+'</option>'; });
  var monOpts = '';
  months2s.forEach(function(m,mi){ monOpts += '<option value="'+(mi+1)+'"'+((mi+1)===semm?' selected':'')+'>'+m+'</option>'; });
  var brOpts = '<option value="">All Branches</option>';
  branches.forEach(function(b){ brOpts += '<option value="'+b.id+'"'+(b.id===selBranch?' selected':'')+'>'+b.name+'</option>'; });

  var html = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:14px">';
  html += '<span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Period</span>';
  html += '<div style="display:flex;gap:4px">';
  html += '<button class="btn btn-sm '+(isYearView?'btn-s':'btn-p')+'" data-salview="month">Monthly</button>';
  html += '<button class="btn btn-sm '+(isYearView?'btn-p':'btn-s')+'" data-salview="year">Yearly</button>';
  html += '</div>';
  html += '<select id="sal-exp-year" data-salsel="year" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg3);color:var(--text)">'+yearOpts+'</select>';
  if(!isYearView) html += '<select id="sal-exp-mon" data-salsel="month" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg3);color:var(--text)">'+monOpts+'</select>';
  html += '<span style="font-size:12px;font-weight:600;color:var(--gold)">'+(isYearView?seyy:months2s[semm-1]+' '+seyy)+'</span>';
  html += '<select id="sal-exp-branch" data-salbranch="1" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg3);color:var(--text)">'+brOpts+'</select>';
  html += '</div>';

  // Filter branches
  var showBranches = selBranch ? branches.filter(function(b){return b.id===selBranch;}) : branches;

  if(isYearView){
    // ── YEAR VIEW: Branch × Month grid ─────────────────────────────────────
    html += '<div class="st">Salary Breakdown — '+seyy+' ('+salMonths.length+' months)</div>';

    // Header row
    var thCols = '<th>Branch</th><th>Staff</th>';
    salMonths.forEach(function(mon){ thCols += '<th class="num" style="font-size:10px">'+months2s[parseInt(mon.split('-')[1])-1]+'</th>'; });
    thCols += '<th class="num" style="color:var(--gold)">Year Total</th>';

    var rows = '';
    var monthGrandTotals = salMonths.map(function(){ return 0; });
    var grandTotal = 0;

    showBranches.forEach(function(b){
      var brS = bSt(b.id).filter(function(st){
        return staffStatusForMonth(st, expMon).status !== 'inactive';
      });
      if(brS.length === 0) return;
      var brYearTotal = 0;
      var mTotals = salMonths.map(function(mon, mi){
        var sal = brS.reduce(function(s,st){return s + proRataSalary(st, mon);}, 0);
        monthGrandTotals[mi] += sal;
        brYearTotal += sal;
        return sal;
      });
      grandTotal += brYearTotal;

      rows += '<tr>';
      rows += '<td style="font-weight:600;color:var(--gold);vertical-align:top">'+b.name+'</td>';
      rows += '<td style="font-size:11px;color:var(--text3);vertical-align:top">'+brS.length+' staff</td>';
      mTotals.forEach(function(sal){ rows += '<td class="num" style="font-weight:500">'+INR(sal)+'</td>'; });
      rows += '<td class="num" style="font-weight:700;color:var(--gold)">'+INR(brYearTotal)+'</td>';
      rows += '</tr>';

      // Staff sub-rows
      brS.forEach(function(st){
        var stYearTotal = 0;
        var stMTotals = salMonths.map(function(mon){
          var sal = proRataSalary(st, mon);
          stYearTotal += sal;
          return sal;
        });
        var status = staffStatusForMonth(st, expMon);
        rows += '<tr style="background:var(--bg4)">';
        rows += '<td style="padding-left:16px;font-size:11px">'+st.name+'</td>';
        rows += '<td style="font-size:10px;color:var(--text3)">'+( st.role||'—')+'</td>';
        stMTotals.forEach(function(sal, mi){
          var sts = staffStatusForMonth(st, salMonths[mi]);
          var isPartial = sts.status === 'partial';
          rows += '<td class="num" style="font-size:11px'+(sal===0?';color:var(--text3)':'')+(isPartial?';color:var(--orange)':'')+'">'+
            (sal > 0 ? INR(sal) : '—')+
            (isPartial ? '<div style="font-size:9px;color:var(--orange)">'+sts.daysWorked+'d</div>' : '')+
          '</td>';
        });
        rows += '<td class="num" style="font-size:11px;color:var(--gold)">'+INR(stYearTotal)+'</td>';
        rows += '</tr>';
      });
    });

    // Month totals footer
    var tfTds = monthGrandTotals.map(function(v){ return '<td class="num" style="color:var(--gold)">'+INR(v)+'</td>'; }).join('');
    rows += '<tr class="tf"><td colspan="2">GRAND TOTAL</td>'+tfTds+'<td class="num" style="color:var(--gold);font-size:14px;font-weight:700">'+INR(grandTotal)+'</td></tr>';

    html += '<div class="card" style="overflow-x:auto"><table><thead><tr>'+thCols+'</tr></thead><tbody>'+rows+'</tbody></table></div>';

  } else {
    // ── MONTH VIEW: Per branch, per staff breakdown ─────────────────────────
    var paidLeaveNote = '<div style="font-size:11px;color:var(--text3);background:var(--bg4);padding:8px 12px;border-radius:6px;margin-bottom:12px">'+
      '&#9432; Salary = Full month salary (if worked full month). For partial months: <strong style="color:var(--gold)">Salary × (Working days + Pro-rata paid leave) / (Total working days + Paid leave)</strong>. '+
      'Men&#39;s branches: 2 paid leave/month. Unisex: 3 paid leave/month. Weekly offs excluded.</div>';
    html += paidLeaveNote;

    var branchTotal = 0;

    showBranches.forEach(function(b){
      var brS = bSt(b.id).filter(function(st){
        return staffStatusForMonth(st, expMon).status !== 'inactive';
      });
      if(brS.length === 0) return;
      var daysInMonth = new Date(seyy, semm, 0).getDate();
      var weeklyOffs = Math.floor(daysInMonth/7)*2 + (daysInMonth%7>=6?1:0);
      var workingDays = daysInMonth - weeklyOffs;
      var paidLeave = b.type === 'unisex' ? 3 : 2;
      var brMonthTotal = brS.reduce(function(s,st){return s+proRataSalary(st,expMon);},0);
      branchTotal += brMonthTotal;

      html += '<div class="form-panel" style="margin-bottom:10px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">';
      html += '<div><span style="font-weight:600;font-size:13px;color:var(--gold)">'+b.name+'</span> ';
      html += '<span class="pill '+(b.type==='unisex'?'pb':'pa')+'" style="font-size:10px">'+b.type+'</span>';
      html += '<span style="font-size:10px;color:var(--text3);margin-left:8px">'+workingDays+' working days + '+paidLeave+' paid leave in '+months2s[semm-1]+'</span></div>';
      html += '<span style="font-size:14px;font-weight:700;color:var(--gold)">Branch Total: '+INR(brMonthTotal)+'</span>';
      html += '</div>';

      html += '<div class="card" style="overflow-x:auto"><table><thead><tr>';
      html += '<th>#</th><th>Staff</th><th>Role</th><th>Status</th><th class="num">Full Salary</th><th class="num">Days Info</th><th class="num" style="color:var(--gold)">Payable Salary</th><th class="num">Calc</th>';
      html += '</tr></thead><tbody>';

      brS.forEach(function(st, idx){
        var sts = staffStatusForMonth(st, expMon);
        var fullSal = st.salary || 0;
        var payable = proRataSalary(st, expMon);
        var isFull = sts.status === 'active' && (!st.join || new Date(st.join) <= new Date(seyy, semm-1, 1)) && (!st.exit_date || new Date(st.exit_date) >= new Date(seyy, semm, 0));

        // Build status badge
        var statusBadge = '';
        if(sts.status === 'inactive'){
          statusBadge = '<span class="pill pr" style="font-size:10px">Inactive</span>';
        } else if(sts.status === 'partial'){
          statusBadge = '<span class="pill pa" style="font-size:10px">Partial</span>'+
            '<div style="font-size:9px;color:var(--orange);margin-top:2px">'+sts.daysWorked+' working days</div>'+
            (st.join && new Date(st.join) > new Date(seyy,semm-1,1)?'<div style="font-size:9px;color:var(--text3)">Joined: '+st.join+'</div>':'')+
            (st.exit_date && new Date(st.exit_date) < new Date(seyy,semm,0)?'<div style="font-size:9px;color:var(--red)">Exit: '+st.exit_date+'</div>':'');
        } else {
          statusBadge = '<span class="pill pg" style="font-size:10px">Full month</span>';
        }

        // Calculation explanation
        var calcNote = '';
        if(payable === 0){
          calcNote = '<span style="color:var(--text3);font-size:10px">Not active</span>';
        } else if(isFull || sts.status === 'active'){
          calcNote = '<span style="font-size:10px;color:var(--text3)">Full month</span>';
        } else {
          var calDays = sts.calDays || sts.daysWorked;
          var proLeave = Math.round(paidLeave * (calDays||sts.daysWorked) / daysInMonth);
          calcNote = '<span style="font-size:10px;color:var(--orange)">'+
            '('+sts.daysWorked+' + '+proLeave+' leave) / ('+workingDays+' + '+paidLeave+')'+
            ' × ₹'+fullSal.toLocaleString('en-IN')+'</span>';
        }

        html += '<tr style="'+(sts.status==='inactive'?'opacity:.5':'')+(payable>0?'':'opacity:.4')+'"><td style="color:var(--text3)">'+(idx+1)+'</td>';
        html += '<td style="font-weight:500">'+st.name+'</td>';
        html += '<td style="font-size:11px"><span class="pill pb" style="font-size:10px">'+(st.role||'—')+'</span></td>';
        html += '<td>'+statusBadge+'</td>';
        html += '<td class="num">'+INR(fullSal)+'</td>';
        html += '<td class="num" style="font-size:11px;color:var(--text3)">'+( sts.daysWorked > 0 ? sts.daysWorked+' days' : '—')+'</td>';
        html += '<td class="num" style="font-weight:700;color:var(--gold)">'+( payable > 0 ? INR(payable) : '<span style="color:var(--text3)">₹0</span>')+'</td>';
        html += '<td style="font-size:10px">'+calcNote+'</td>';
        html += '</tr>';
      });

      html += '<tr class="tf"><td colspan="6">Branch Salary Total — '+months2s[semm-1]+' '+seyy+'</td>';
      html += '<td class="num" style="color:var(--gold);font-size:13px;font-weight:700">'+INR(brMonthTotal)+'</td>';
      html += '<td></td></tr>';
      html += '</tbody></table></div></div>';
    });

    if(showBranches.length > 1){
      html += '<div style="background:rgba(192,146,45,.08);border:1px solid rgba(192,146,45,.3);border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">';
      html += '<div style="font-weight:600;color:var(--gold)">Grand Total — All Branches — '+months2s[semm-1]+' '+seyy+'</div>';
      html += '<div style="font-size:22px;font-weight:700;color:var(--gold)">'+INR(branchTotal)+'</div></div>';
    }
  }

  return html;
}

    <button class="t2b${tab==='rent'?' active':''}" onclick="sET('rent',this)">Rent</button>
    <button class="t2b${tab==='elec'?' active':''}" onclick="sET('elec',this)">Electricity</button>
    <button class="t2b${tab==='wifi'?' active':''}" onclick="sET('wifi',this)">WiFi</button>
    <button class="t2b${tab==='water'?' active':''}" onclick="sET('water',this)">Water</button>
    <button class="t2b${tab==='salary_exp'?' active':''}" onclick="sET('salary_exp',this)">&#128184; Salary</button>

  if(tab==='txn'){

    const thisMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

    body=`

        const [sy,sm]=selMonth.split('-').map(Number);
        let yOpts=YEARS2.map(y=>`<option value="${y}" ${y===sy?'selected':''}>${y}</option>`).join('');
        let mOpts=MNAMES2.map((m,mi)=>`<option value="${mi+1}" ${mi+1===sm?'selected':''}>${m}</option>`).join('');
        return `<select id="txn-year-sel" onchange="window._txnMonth=this.value+'-'+String(document.getElementById('txn-mon-sel').value).padStart(2,'0');rExpTab('txn')" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg4);color:var(--text)">${yOpts}</select>
        <select id="txn-mon-sel" onchange="window._txnMonth=document.getElementById('txn-year-sel').value+'-'+String(this.value).padStart(2,'0');rExpTab('txn')" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg4);color:var(--text)">${mOpts}</select>`;
      })()}
      <span class="txn-badge">&#9733; Monthly only — not carried forward</span>
      ${isAdm()?`<span style="font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline" onclick="showPage('users',document.querySelectorAll('.nb')[7]);setMasterTab('exptypes',null)">+ Manage expense types in Master Setup</span>`:''}

    </div>

    ${canAdd?`<div class="form-panel">
      <div class="form-title">Add Transaction for ${selMonth}</div>
      <div class="form-grid">
        <div class="fg"><label>Branch</label><select id="txn-branch">${branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div>
        <div class="fg"><label>Type</label><select id="txn-type">${TXN_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div class="fg"><label>Amount (&#8377;)</label><input type="number" id="txn-amount" placeholder="0" min="0"></div>
        <div class="fg"><label>Date</label><input type="date" id="txn-date" value="${new Date().toISOString().slice(0,10)}"></div>

      </div>
      <div class="btn-row"><button class="btn btn-p" onclick="saveTxn('${selMonth}')">Add Transaction</button></div>
    </div>`:''}

    <div class="st">All Transactions — ${selMonth}</div>
    ${branches.filter(b=>(byBranch[b.id]||[]).length>0).map(b=>{
      const bTxns=byBranch[b.id]||[];
      const bTotal=bTxns.reduce((s,t)=>s+(t.amount||0),0);
      return`<div class="form-panel" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <span style="font-weight:600;color:var(--gold)">${b.name}</span>
          <span style="font-size:12px;color:var(--text2)">Total: <strong style="color:var(--gold)">${INR(bTotal)}</strong></span>
        </div>
        <table>
          <thead><tr><th>Type</th><th>Date</th><th class="num">Amount</th><th>Note</th>${canAdd?'<th></th>':''}</tr></thead>
          <tbody>${bTxns.map(t=>`<tr>
            <td style="font-weight:500">${t.type||''}</td>
            <td style="font-size:11px">${t.date||''}</td>
            <td class="num"><strong>${INR(t.amount||0)}</strong></td>
            <td style="font-size:11px;color:var(--text3)">${t.note||'—'}</td>
            ${canAdd?`<td><button class="btn btn-d btn-sm" onclick="delTxn('${t.id}')">Del</button></td>`:''}
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
    }).join('')||`<div style="text-align:center;padding:30px;color:var(--text3)">No transactions recorded for ${selMonth}.<br>${canAdd?'Add the first one above.':'Contact admin or accountant.'}</div>`}

    ${monthTxns.length>0?`<div class="form-panel" style="background:var(--bg4)">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><div style="font-weight:600;color:var(--gold);font-size:13px">Grand Total — ${selMonth}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${monthTxns.length} transactions across ${branches.filter(b=>(byBranch[b.id]||[]).length>0).length} branches</div></div>
        <div style="font-size:22px;font-weight:700;color:var(--gold)">${INR(grandTotal)}</div>
      </div>
      <div class="gold-line"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px">
        ${getExpTypes().map(type=>{const total=monthTxns.filter(t=>t.type===type).reduce((s,t)=>s+(t.amount||0),0);return total>0?`<div style="background:var(--bg5);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text3)">${type}</div><div style="font-weight:600;color:var(--text)">${INR(total)}</div></div>`:'';}).join('')}
      </div>
    </div>`:''}`;
  }
  else if(tab==='rent'||tab==='elec'||tab==='wifi'||tab==='water'){
    body = buildMonthExpTab(tab);
  }
  else if(tab==='salary_exp'){
    body = buildSalaryExpTab();
  }
    else{
    {
      // Summary uses global period filter (same as dashboard/P&L)
      const months=filterMode==='month'?[filterPrefix()]:activeMonthsInYear(filterYear);
      const pLabel=filterMode==='year'?filterYear+' ('+months.length+' months)':periodLabel();
      const summaryRows=branches.map(b=>{
        const inc=bInc(b.id);
        const exp=bExp(b.id);
        const net=inc-exp;
        const periodEnts=entries.filter(e=>e.branch_id===b.id&&inPeriod(e.date));
        const sal=months.reduce((t,mon)=>t+bSt(b.id).reduce((s,st)=>s+proRataSalary(st,mon),0),0);
        const inc2=periodEnts.reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
        const fixed=months.reduce((t,mon)=>{const mf=getMonthlyFixed(b.id,mon);return t+mf.shop_rent+mf.room_rent+mf.shop_elec+mf.room_elec+mf.wifi+mf.water;},0);
        const txns=transactions.filter(t=>t.branch_id===b.id&&inPeriod(t.date||t.month+'-01')).reduce((s,t)=>t.cat==='income'?s-(t.amount||0):s+(t.amount||0),0);
        const misc=periodEnts.reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.mat_expense||0)+(e.petrol||0),0);
        return`<tr>
          <td style="font-weight:500;white-space:nowrap">${b.name}</td>
          <td class="num green">${INR(inc)}</td>
          <td class="num" style="color:var(--gold)">${INR(sal)}</td>
          <td class="num">${INR(inc2)}</td>
          <td class="num">${INR(fixed)}</td>
          <td class="num">${txns>0?INR(txns):'—'}</td>
          <td class="num">${misc>0?INR(misc):'—'}</td>
          <td class="num">${M(exp)}</td>
          <td class="num ${net>=0?'green':'red'}" style="font-weight:600">${isAdm()?net>=0?INR(net):'('+INR(-net)+')':MASK}</td>
        </tr>`;
      }).join('');
      const tI=branches.reduce((s,b)=>s+bInc(b.id),0);
      const tE=branches.reduce((s,b)=>s+bExp(b.id),0);
      const tNet=tI-tE;
      body=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div class="st" style="margin:0">Expense Summary — ${pLabel}</div>

      <div class="card" style="overflow-x:auto"><table>
        <thead><tr>
          <th>Branch</th>
          <th class="num">Income</th>

          <th class="num">Incentives</th>
          <th class="num">Fixed Costs</th>
          <th class="num">Transactions</th>
          <th class="num">Other</th>
          <th class="num">Total Exp</th>
          <th class="num">Net P&L</th>

        <tbody>${summaryRows}</tbody>
        <tfoot><tr class="tf">
          <td>TOTAL</td>
          <td class="num">${INR(tI)}</td>
          <td colspan="5"></td>
          <td class="num">${M(tE)}</td>

  const expHdr='<div class="page-hdr"><div class="page-title">Expenses</div><button class="refresh-btn" onclick="rExpTab(currentExpTab)"><span class="ri">&#8635;</span> Refresh</button></div>';
  el.innerHTML=expHdr+tabs+body;
}

function rPL(){
  const el=document.getElementById('page-pl');if(!el)return;
  el.innerHTML='<div class="page-hdr"><div class="page-title">P&L Report</div><button class="refresh-btn" onclick="rPL()"><span class="ri">&#8635;</span> Refresh</button></div>';
  el.innerHTML+=periodWidget('rPL');

  const months = filterMode==='month' ? [filterPrefix()] : activeMonthsInYear(filterYear);
  const isYear = filterMode==='year';
  const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Cost centers: sum across active months
  const ccMonthly = costCenters.reduce((s,cc)=>s+(cc.monthly_cost||0),0);
  const ccTotal = ccMonthly * months.length;

  const tI=branches.reduce((s,b)=>s+bInc(b.id),0);
  const tE=branches.reduce((s,b)=>s+bExp(b.id),0)+ccTotal;
  const net=tI-tE;

  // Period label for headers
  const pLabel = isYear
    ? filterYear+' ('+months.length+' month'+(months.length>1?'s':'')+')'
    : periodLabel();

  el.innerHTML+=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-l">Total Income</div><div class="kpi-v green">${INR(tI)}</div><div class="kpi-s">${pLabel}</div></div>
    <div class="kpi"><div class="kpi-l">Total Expenses</div><div class="kpi-v red">${M(tE)}</div></div>
    <div class="kpi"><div class="kpi-l">Net P&L</div><div class="kpi-v ${net>=0?'green':'red'}">${isAdm()?net>=0?INR(net):'('+INR(-net)+')':MASK}</div><div class="kpi-s">${net>=0?'Profit':'Loss'}</div></div>
    <div class="kpi"><div class="kpi-l">Coverage</div><div class="kpi-v orange">${isAdm()&&tE>0?(tI/tE*100).toFixed(1)+'%':MASK}</div></div>
  </div>`;

  // ── Branch breakdown table ──────────────────────────────────────────────────
  el.innerHTML+=`<div class="st">Branch P&L Breakdown — ${pLabel}</div>`;

  if(isYear && months.length > 1){
    // ── YEAR MODE: per-branch rows with per-month columns ─────────────────────
    // Header: # | Branch | Jan | Feb | ... | Total Income | Total Exp | Net P&L
    let thCols='<th>#</th><th>Branch</th>';
    months.forEach(function(mon){
      const mm=parseInt(mon.split('-')[1])-1;
      thCols+='<th class="num" style="font-size:10px">'+MNAMES[mm]+'<br><span style="font-weight:400;font-size:9px;color:var(--text3)">P&L</span></th>';
    });
    thCols+='<th class="num">Income</th><th class="num">Expenses</th><th class="num">Net P&L</th>';

    let rows='';
    branches.forEach(function(b,i){
      const inc=bInc(b.id);
      const exp=bExp(b.id);
      const net2=inc-exp;

      // Per-month net P&L
      let monthCells='';
      months.forEach(function(mon){
        const prevMode=filterMode,prevYear=filterYear,prevMonth=filterMonth;
        // Temporarily set filter to this month to calculate
        filterMode='month';
        filterYear=parseInt(mon.split('-')[0]);
        filterMonth=parseInt(mon.split('-')[1]);
        const mInc=bInc(b.id);
        const mExp=bExp(b.id,[mon]);
        filterMode=prevMode;filterYear=prevYear;filterMonth=prevMonth;
        const mNet=mInc-mExp;
        const hasData=entries.some(function(e){return e.branch_id===b.id&&e.date&&e.date.startsWith(mon);});
        monthCells+='<td class="num '+(mNet>=0?'green':'red')+'" style="font-size:11px;'+(hasData?'':'opacity:.4')+'">';
        monthCells+=isAdm()?(mNet>=0?INR(mNet):'('+INR(-mNet)+')'):'—';

      rows+='<td class="num">'+M(exp)+'</td>';
      rows+='<td class="num '+(net2>=0?'green':'red')+'" style="font-weight:600">'+(isAdm()?net2>=0?INR(net2):'('+INR(-net2)+')':MASK)+'</td>';
      rows+='</tr>';

    // Cost center row
    if(costCenters.length>0){
      rows+='<tr style="background:var(--bg4)"><td></td><td style="font-size:11px;color:var(--text3)">Cost Centers (shared overhead)</td>';

        rows+='<td class="num" style="font-size:11px;color:var(--text3)">('+INR(ccMonthly)+')</td>';
      });
      rows+='<td class="num">—</td><td class="num" style="color:var(--red)">'+M(ccTotal)+'</td><td class="num red">('+INR(ccTotal)+')</td></tr>';
    }

    // Total row
    rows+='<tr class="tf"><td colspan="2">TOTAL</td>';
    months.forEach(function(mon){
      const prevMode=filterMode,prevYear=filterYear,prevMonth=filterMonth;

    rows+='<td class="num">'+INR(tI)+'</td><td class="num">'+M(tE)+'</td>';
    rows+='<td class="num '+(net>=0?'green':'red')+'" style="font-size:14px;font-weight:700">'+(isAdm()?net>=0?INR(net):'('+INR(-net)+')':MASK)+'</td>';
    rows+='</tr>';

    el.innerHTML+=`<div class="card" style="overflow-x:auto"><table>
      <thead><tr>${thCols}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  } else {
    // ── MONTH MODE: detailed column breakdown ────────────────────────────────
    el.innerHTML+=`<div class="card" style="overflow-x:auto"><table>
    <thead><tr>
      <th>#</th><th>Branch</th>
      <th class="num">Income</th>
      <th class="num">Salary</th>
      <th class="num">Incentives</th>
      <th class="num">Fixed Costs</th>
      <th class="num">Transactions</th>
      <th class="num">Other</th>
      <th class="num">Total Exp</th>
      <th class="num">Net P&L</th>
    </tr></thead>
    <tbody>${branches.map((b,i)=>{
      const inc=bInc(b.id);
      const exp=bExp(b.id);
      const net2=inc-exp;
      // Get detailed breakdown
      const mon=filterPrefix();
      const brS=bSt(b.id);
      const mf=getMonthlyFixed(b.id,mon);
      const sal=brS.reduce((s,st)=>s+proRataSalary(st,mon),0);
      const periodEnts=entries.filter(e=>e.branch_id===b.id&&inPeriod(e.date));
      const inc2=periodEnts.reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
      const fixedCost=mf.shop_rent+mf.room_rent+mf.shop_elec+mf.room_elec+mf.wifi+mf.water;
      const txns=transactions.filter(t=>t.branch_id===b.id&&t.cat!=='income'&&inPeriod(t.date||t.month+'-01')).reduce((s,t)=>s+(t.amount||0),0);
      const misc=periodEnts.reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.mat_expense||0)+(e.petrol||0),0);
      return`<tr>
        <td style="color:var(--text3)">${i+1}</td>
        <td style="font-weight:500;white-space:nowrap">${b.name}</td>
        <td class="num green">${INR(inc)}</td>
        <td class="num" style="color:var(--gold)">${INR(sal)}</td>
        <td class="num">${INR(inc2)}</td>
        <td class="num">${INR(fixedCost)}</td>
        <td class="num">${txns>0?INR(txns):'—'}</td>
        <td class="num">${misc>0?INR(misc):'—'}</td>
        <td class="num">${M(exp)}</td>
        <td class="num ${net2>=0?'green':'red'}" style="font-weight:600">${isAdm()?net2>=0?INR(net2):'('+INR(-net2)+')':MASK}</td>
      </tr>`;
    }).join('')}
    ${costCenters.length>0?`<tr style="background:var(--bg4)">
      <td></td><td style="font-size:11px;color:var(--text3)">Cost Centers</td>

// ── CALENDAR VIEW ─────────────────────────────────────────────────────────────
function buildLeaveCalendar(){
  const calMon=window._calMon||filterPrefix();
  const [yr,mo]=calMon.split('-').map(Number);
  const daysInMonth=new Date(yr,mo,0).getDate();
  const firstDay=new Date(yr,mo-1,1).getDay(); // 0=Sun
  const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayStr=new Date().toISOString().slice(0,10);

  // Build date→leaves map for approved leaves this month
  const dayMap={};
  for(let d=1;d<=daysInMonth;d++){
    const ds=yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    // Find all leaves that cover this date
    const dayLeaves=leaves.filter(function(l){
      if(l.status!=='approved') return false;
      if(!l.date) return false;
      // Support multi-day: date + days
      const start=new Date(l.date);
      const end=new Date(start.getTime()+(((l.days||1)-1)*86400000));
      const cur=new Date(ds);
      return cur>=start && cur<=end;
    });
    if(dayLeaves.length>0) dayMap[ds]=dayLeaves;
  }

  // Month nav
  const prevMo=mo===1?(yr-1)+'-12':yr+'-'+String(mo-1).padStart(2,'0');
  const nextMo=mo===12?(yr+1)+'-01':yr+'-'+String(mo+1).padStart(2,'0');
  const years2=[];for(let y=new Date().getFullYear();y>=2023;y--)years2.push(y);

  let monthOpts='';
  years2.forEach(function(y){
    MNAMES.forEach(function(m,mi){
      const val=y+'-'+String(mi+1).padStart(2,'0');
      monthOpts+='<option value="'+val+'"'+(val===calMon?' selected':'')+'>'+m+' '+y+'</option>';
    });
  });

  let html='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
  html+='<button class="btn btn-s btn-sm" data-calnav="'+prevMo+'">&#8592; Prev</button>';
  html+='<select id="cal-mon-sel" onchange="window._calMon=this.value;setLvTab(\'calendar\',null)" style="padding:5px 9px;border:1px solid var(--border2);border-radius:5px;font-size:12px;background:var(--bg3);color:var(--text)">'+monthOpts+'</select>';
  html+='<button class="btn btn-s btn-sm" data-calnav="'+nextMo+'">Next &#8594;</button>';
  html+='<span style="font-size:13px;font-weight:600;color:var(--gold)">'+MNAMES[mo-1]+' '+yr+'</span>';
  // Count total leave days this month
  const totalLeaveDays=Object.values(dayMap).reduce(function(s,a){return s+a.length;},0);
  html+='<span style="font-size:11px;color:var(--text3);margin-left:8px">'+totalLeaveDays+' staff-leave-days this month</span>';
  html+='</div>';

  // Calendar grid
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">';
  DNAMES.forEach(function(d){ html+='<div style="text-align:center;font-size:10px;color:var(--text3);padding:4px;font-weight:600;text-transform:uppercase">'+d+'</div>'; });

  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+='<div></div>';

  for(let d=1;d<=daysInMonth;d++){
    const ds=yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayLvs=dayMap[ds]||[];
    const isToday=ds===todayStr;
    const isWeekend=(new Date(ds).getDay()===0||new Date(ds).getDay()===6);
    let cellStyle='border-radius:8px;padding:6px 4px;min-height:70px;cursor:'+(dayLvs.length>0?'pointer':'default')+';';
    cellStyle+='background:'+(isToday?'rgba(192,146,45,.15)':isWeekend?'var(--bg4)':'var(--bg3)')+';';
    cellStyle+='border:1px solid '+(isToday?'var(--gold)':dayLvs.length>0?'rgba(224,82,82,.4)':'var(--border)')+';';
    cellStyle+='transition:box-shadow .15s;';

    let inner='<div style="font-size:11px;font-weight:600;color:'+(isToday?'var(--gold)':isWeekend?'var(--text3)':'var(--text)')+'">'+d+'</div>';

    if(dayLvs.length>0){
      // Group by branch
      const branchMap={};
      dayLvs.forEach(function(l){
        const s=staff.find(function(x){return x.id===l.staff_id;});
        const bid=s?s.branch_id:'?';
        const b=branches.find(function(x){return x.id===bid;});
        const bName=b?b.name.replace('V-CUT ',''):'?';
        if(!branchMap[bName]) branchMap[bName]=[];
        branchMap[bName].push(s?s.name:l.staff_id);
      });
      inner+='<div style="margin-top:4px">';
      Object.keys(branchMap).slice(0,2).forEach(function(bName){
        const names=branchMap[bName];
        inner+='<div style="background:rgba(224,82,82,.15);border-radius:3px;padding:2px 4px;margin-top:2px;font-size:9px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+names.join(', ')+'">';
        inner+=names.length>1?names.length+' staff':names[0];
        inner+='</div>';
      });
      if(Object.keys(branchMap).length>2) inner+='<div style="font-size:9px;color:var(--text3);margin-top:1px">+'+(Object.keys(branchMap).length-2)+' more</div>';
      inner+='</div>';
      inner+='<div style="font-size:9px;color:var(--red);font-weight:600;margin-top:3px">'+dayLvs.length+' on leave</div>';

    }

    html+='<div style="'+cellStyle+'"'+(dayLvs.length>0?' data-daydetail="'+ds+'"':'')+'>'+inner+'</div>';
  }
  html+='</div>';

  // Legend
  html+='<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;margin-bottom:14px">';
  html+='<span><span style="display:inline-block;width:12px;height:12px;background:rgba(192,146,45,.15);border:1px solid var(--gold);border-radius:3px;vertical-align:middle;margin-right:4px"></span>Today</span>';
  html+='<span><span style="display:inline-block;width:12px;height:12px;background:rgba(224,82,82,.15);border:1px solid rgba(224,82,82,.4);border-radius:3px;vertical-align:middle;margin-right:4px"></span>Leave day (click for details)</span>';
  html+='<span><span style="display:inline-block;width:12px;height:12px;background:var(--bg4);border:1px solid var(--border);border-radius:3px;vertical-align:middle;margin-right:4px"></span>Weekend</span>';
  html+='</div>';

  // Day detail modal
  html+='<div id="day-leave-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;align-items:center;justify-content:center;padding:20px">';
  html+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)">';
  html+='<div style="font-size:14px;font-weight:700;color:var(--gold)" id="dlm-title">Leave Details</div>';
  html+='<button id="dlm-close-btn" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">&#10005;</button>';
  html+='</div><div id="dlm-body" style="overflow-y:auto;padding:14px"></div></div></div>';

  return html;
}

  const byBranch={};

    html+='<div style="font-size:11px;font-weight:600;color:var(--gold);margin-bottom:6px">'+br.name+' ('+br.list.length+')</div>';

      const l=item.leave,s=item.staffObj;
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg4);border-radius:6px;margin-bottom:4px">';
      html+='<div><div style="font-weight:500">'+( s?s.name:l.staff_id )+'</div>';
      html+='<div style="font-size:10px;color:var(--text3)">'+( l.type||'Leave' )+' · '+(l.days||1)+' day'+(l.days>1?'s':'')+(l.reason?' · '+l.reason:'')+'</div></div>';
      html+='<span class="leave-status ls-approved">approved</span>';
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('dlm-body').innerHTML=html;
  document.getElementById('day-leave-modal').style.display='flex';
}

async function applyLeaveAdmin(){
  const date=document.getElementById('alv-date').value;
  const days=parseInt(document.getElementById('alv-days').value)||1;
  const type=document.getElementById('alv-type').value;
  const reason=document.getElementById('alv-reason').value;
  if(!date){toast('Please select a date','error');return;}
  const checked=Array.from(document.querySelectorAll('#alv-staff-list input[type=checkbox]:checked'));
  if(checked.length===0){toast('Select at least one staff member','error');return;}
  let saved=0;
  for(const cb of checked){
    const sid=cb.value;
    const s=staff.find(function(x){return x.id===sid;});
    const lv={staff_id:sid,branch_id:s?s.branch_id:'',date,days,type,reason,status:'approved',applied_by:currentUser.id,applied_on:new Date().toISOString()};
    await addDoc(collection(db,'leaves'),lv);
    saved++;
  }
  toast('Leave applied for '+saved+' staff member'+(saved>1?'s':''),'success');
  document.querySelectorAll('#alv-staff-list input[type=checkbox]').forEach(function(c){c.checked=false;});
  document.getElementById('alv-reason').value='';
}
window.applyLeaveAdmin=applyLeaveAdmin;

// Salary setup functions
function recalcBranchTotal(bid){
  const bStaff=staff.filter(s=>s.branch_id===bid);
  // Also check if any staff in other inputs has been reassigned to this branch
  const allInputStaff=staff.filter(s=>{
    const sel=document.getElementById('sal-branch-'+s.id);
    return sel && sel.value===bid;
  });
  const uniqueIds=[...new Set([...bStaff.map(s=>s.id),...allInputStaff.map(s=>s.id)])];
  let total=0;
  uniqueIds.forEach(sid=>{
    const inp=document.getElementById('sal-amt-'+sid);
    if(inp) total+=parseFloat(inp.value||0);
  });
  const el=document.getElementById('sal-total-'+bid);
  if(el) el.textContent='\u20B9'+Math.round(total).toLocaleString('en-IN');
}
window.recalcBranchTotal=recalcBranchTotal;

async function saveBranchSalaries(bid){
  const bStaff=staff.filter(s=>s.branch_id===bid);
  let branchTotal=0;
  const updates=[];
  // Save each staff member's salary, target and branch assignment
  for(const s of bStaff){
    const salEl=document.getElementById('sal-amt-'+s.id);
    const tgtEl=document.getElementById('sal-tgt-'+s.id);
    const brEl=document.getElementById('sal-branch-'+s.id);
    if(!salEl) continue;
    const salary=parseFloat(salEl.value||0);
    const target=parseFloat(tgtEl?.value||0);
    const newBranch=brEl?brEl.value:s.branch_id;
    branchTotal+=salary;
    updates.push({id:s.id,salary,target,branch_id:newBranch});
  }
  try{
    // Save each staff salary
    for(const u of updates){
      await setDoc(doc(db,'staff',u.id),{salary:u.salary,target:u.target,branch_id:u.branch_id},{merge:true});
    }
    // Auto-update branch salary_budget = sum of all staff salaries in this branch
    await setDoc(doc(db,'branches',bid),{salary_budget:branchTotal},{merge:true});
    toast(`Salaries saved! Budget auto-set to ${INR(branchTotal)}`, 'success');
  }catch(e){
    console.error(e);
    if(e.code==='permission-denied') showFirebaseRulesHelp();
    else toast('Error: '+e.message,'error');
  }
}
window.saveBranchSalaries=saveBranchSalaries;

// Unified save: reads whatever inputs exist + merges with existing record
async function saveExpField(bid, month, fields){
  // Get current saved record for this branch+month
  const existing = monthlyExpenses.find(function(m){return m.branch_id===bid&&m.month===month;}) || {};
  // Get current branch defaults as fallback
  const b = branches.find(function(x){return x.id===bid;}) || {};
  // Build complete record: start from defaults, overlay existing, overlay new values
  const data = {
    branch_id: bid,
    month: month,
    updated_by: currentUser.id,
    updated_at: new Date().toISOString(),
    shop_rent:  existing.shop_rent  !== undefined ? existing.shop_rent  : (b.shop_rent  || 0),
    room_rent:  existing.room_rent  !== undefined ? existing.room_rent  : (b.room_rent  || 0),
    shop_elec:  existing.shop_elec  !== undefined ? existing.shop_elec  : (b.shop_elec  || 0),
    room_elec:  existing.room_elec  !== undefined ? existing.room_elec  : (b.room_elec  || 0),
    wifi:       existing.wifi       !== undefined ? existing.wifi       : (b.wifi       || 0),
    water:      existing.water      !== undefined ? existing.water      : (b.water      || 0),
  };
  // Override with whatever the user just edited
  var fieldMap = {'srent':'shop_rent','rrent':'room_rent','selec':'shop_elec','relec':'room_elec','wifi':'wifi','water':'water','shop_rent':'shop_rent','room_rent':'room_rent','shop_elec':'shop_elec','room_elec':'room_elec'};
  fields.forEach(function(f){
    var el = document.getElementById('ef-'+f+'-'+bid) || document.getElementById('mf-'+f+'-'+bid);
    var key = fieldMap[f] || f;
    if(el) data[key] = parseFloat(el.value || 0);
  });
  try{
    await setDoc(doc(db,'monthly_expenses',bid+'_'+month), data);
    toast('Saved for '+month,'success');
    // Force refresh of the display
    rExpTab(currentExpTab);
  }
  catch(e){if(e.code==='permission-denied')showFirebaseRulesHelp();else toast('Error: '+e.message,'error');}
}

// Live row total calculator for expense tabs
function calcRowTotal(tab, bid){
  var f1, f2;
  if(tab==='rent')   { f1=document.getElementById('ef-srent-'+bid); f2=document.getElementById('ef-rrent-'+bid); }
  if(tab==='elec')   { f1=document.getElementById('ef-selec-'+bid); f2=document.getElementById('ef-relec-'+bid); }
  if(tab==='wifi')   { f1=document.getElementById('ef-wifi-'+bid);  f2=null; }
  if(tab==='water')  { f1=document.getElementById('ef-water-'+bid); f2=null; }
  if(!f1) return;
  var total = (parseFloat(f1.value)||0) + (f2?parseFloat(f2.value)||0:0);
  var el = document.getElementById('ef-rowtotal-'+tab+'-'+bid);
  if(el) el.textContent = '₹' + Math.round(total).toLocaleString('en-IN');
  // Also update footer total live
  var allF1 = Array.from(document.querySelectorAll('[id^="ef-'+
    (tab==='rent'?'srent':tab==='elec'?'selec':'wifi')+'-"]'));
  var allF2 = Array.from(document.querySelectorAll('[id^="ef-'+
    (tab==='rent'?'rrent':tab==='elec'?'relec':'water')+'-"]'));
  var sum1=0,sum2=0;
  allF1.forEach(function(i){sum1+=parseFloat(i.value)||0;});
  allF2.forEach(function(i){sum2+=parseFloat(i.value)||0;});
}
window.calcRowTotal=calcRowTotal;
