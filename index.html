<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-CUT Group — Salon Management Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#111;min-height:100vh;font-size:13px}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#1a2b4c;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:500;letter-spacing:.3px}
.topbar .badge{background:#c9a83c;color:#1a2b4c;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.nav{background:#fff;border-bottom:.5px solid #e0e0e0;display:flex;overflow-x:auto;flex-shrink:0;padding:0 12px}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:#c9a83c;border-radius:2px}
.nav-btn{padding:12px 16px;font-size:13px;font-weight:400;color:#666;cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn.active{color:#1a2b4c;border-bottom-color:#c9a83c;font-weight:500}
.nav-btn:hover:not(.active){color:#111}
.content{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
.page{display:none}.page.active{display:block}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#fff;border:.5px solid #e0e0e0;border-radius:10px;padding:14px 16px}
.kpi-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:500;line-height:1}
.kpi-sub{font-size:11px;color:#666;margin-top:4px}
.red{color:#a32d2d}.green{color:#3b6d11}.orange{color:#854f0b}.blue{color:#185fa5}

.section-title{font-size:15px;font-weight:500;margin-bottom:12px;color:#111}
.card{background:#fff;border:.5px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-head{padding:12px 16px;background:#1a2b4c;color:#fff;font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f0f4fa;color:#1a2b4c;font-weight:500;font-size:11px;padding:8px 12px;text-align:left;border-bottom:1px solid #e0e8f5;white-space:nowrap}
td{padding:8px 12px;border-bottom:.5px solid #e0e0e0;color:#111}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tf{background:#f0f4fa;font-weight:500}
.num{text-align:right;font-variant-numeric:tabular-nums}

.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.pill-red{background:#fcebeb;color:#a32d2d}
.pill-green{background:#eaf3de;color:#3b6d11}
.pill-amber{background:#faeeda;color:#854f0b}
.pill-blue{background:#e6f1fb;color:#185fa5}
.pill-gold{background:#faeeda;color:#854f0b}

.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.branch-card{background:#fff;border:.5px solid #e0e0e0;border-radius:10px;padding:0;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.branch-card:hover{box-shadow:0 2px 12px rgba(26,43,76,.12)}
.branch-card-head{background:#1a2b4c;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.branch-card-head .bname{font-size:13px;font-weight:500}
.branch-card-body{padding:12px 14px}
.branch-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:.5px solid #e0e0e0}
.branch-row:last-child{border-bottom:none}
.branch-row .blabel{font-size:11px;color:#666}
.branch-row .bval{font-size:12px;font-weight:500}

.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:none;border:.5px solid #e0e0e0;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:#666}
.back-btn:hover{background:#f5f5f5}
.detail-name{font-size:18px;font-weight:500}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}

.staff-rank{display:flex;align-items:center;gap:8px}
.rank-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.rank-gold{background:#faeeda;color:#854f0b}
.rank-silver{background:#f1efe8;color:#5f5e5a}
.rank-bronze{background:#faece7;color:#993c1d}
.rank-other{background:#f5f5f5;color:#666}

.progress-bar{height:6px;background:#e9ecef;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px}

.tab2{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab2-btn{padding:6px 14px;font-size:12px;border:.5px solid #e0e0e0;border-radius:6px;cursor:pointer;background:none;color:#666}
.tab2-btn.active{background:#1a2b4c;color:#fff;border-color:#1a2b4c}

.form-panel{background:#fff;border:.5px solid #e0e0e0;border-radius:8px;padding:16px;margin-bottom:14px}
.form-title{font-size:13px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid #e0e0e0}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:#666;font-weight:500}
.form-group input,.form-group select{padding:7px 9px;border:.5px solid #e0e0e0;border-radius:6px;font-size:12px;background:#fff;color:#111;width:100%}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#1a2b4c}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;border:none}
.btn-primary{background:#1a2b4c;color:#fff}.btn-primary:hover{background:#243d6a}
.btn-secondary{background:none;border:.5px solid #e0e0e0;color:#666}.btn-secondary:hover{background:#f5f5f5}
.btn-danger{background:#fcebeb;color:#a32d2d;border:.5px solid #f7c1c1}.btn-danger:hover{background:#f7c1c1}
.btn-success{background:#eaf3de;color:#3b6d11;border:.5px solid #c0dd97}.btn-success:hover{background:#c0dd97}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;right:20px;background:#1a2b4c;color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.section-divider{height:.5px;background:#e0e0e0;margin:16px 0}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;margin-left:auto;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>V-CUT GROUP</h1>
  <span class="badge">LIVE</span>
  <span style="font-size:11px;opacity:.7">April 2026</span>
  <span class="live-dot" title="Data saved locally"></span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">Dashboard</button>
  <button class="nav-btn" onclick="showPage('branches',this)">Branches</button>
  <button class="nav-btn" onclick="showPage('entry',this)">Data Entry</button>
  <button class="nav-btn" onclick="showPage('staff',this)">Staff</button>
  <button class="nav-btn" onclick="showPage('expenses',this)">Expenses</button>
  <button class="nav-btn" onclick="showPage('pl',this)">P&L Report</button>
  <button class="nav-btn" onclick="showPage('settings',this)">Settings</button>
</div>
<div class="content">

<div class="page active" id="page-dashboard">
  <div class="kpi-grid" id="dash-kpis"></div>
  <div class="two-col">
    <div>
      <div class="section-title">Branch performance</div>
      <div class="card"><table id="dash-table"></table></div>
    </div>
    <div>
      <div class="section-title">Expense breakdown</div>
      <div class="card"><table id="dash-exp"></table></div>
    </div>
  </div>
</div>

<div class="page" id="page-branches">
  <div id="branch-list-view">
    <div class="tab2">
      <button class="tab2-btn active" onclick="filterBranches('all',this)">All (15)</button>
      <button class="tab2-btn" onclick="filterBranches('mens',this)">Men's</button>
      <button class="tab2-btn" onclick="filterBranches('unisex',this)">Unisex</button>
    </div>
    <div class="branch-grid" id="branch-grid"></div>
  </div>
  <div id="branch-detail-view" style="display:none"></div>
</div>

<div class="page" id="page-entry">
  <div class="form-panel">
    <div class="form-title">Daily Sales Entry</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Branch</label>
        <select id="entry-branch" onchange="loadEntryForm()">
          <option value="">Select branch...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="entry-date" value="">
      </div>
    </div>
    <div id="entry-form-body" style="display:none">
      <div class="form-grid" id="entry-income-fields"></div>
      <div class="section-divider"></div>
      <div class="section-title" style="margin-bottom:8px">Staff Billing</div>
      <div id="entry-staff-billing"></div>
      <div class="section-divider"></div>
      <div class="form-grid" id="entry-expense-fields"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
        <button class="btn btn-secondary" onclick="clearEntry()">Clear</button>
        <span id="entry-status" style="font-size:11px;color:#666"></span>
      </div>
    </div>
  </div>
  <div id="entry-recent">
    <div class="section-title">Recent entries</div>
    <div class="card"><table id="recent-table"><thead><tr><th>Date</th><th>Branch</th><th class="num">Online</th><th class="num">Cash</th><th class="num">Total</th><th class="num">Expenses</th><th></th></tr></thead><tbody id="recent-body"><tr><td colspan="7" style="text-align:center;padding:20px;color:#666">No entries yet</td></tr></tbody></table></div>
  </div>
</div>

<div class="page" id="page-staff">
  <div id="staff-list-view">
    <div class="btn-row" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="showAddStaff()">+ Add Staff</button>
      <select id="staff-branch-filter" onchange="renderStaffTable()" style="padding:6px 10px;border:.5px solid #e0e0e0;border-radius:6px;font-size:12px;background:#fff;color:#111">
        <option value="">All Branches</option>
      </select>
    </div>
    <div id="add-staff-form" style="display:none" class="form-panel">
      <div class="form-title">Add / Edit Staff Member</div>
      <div class="form-grid">
        <div class="form-group"><label>Name</label><input id="sf-name" placeholder="Staff name"></div>
        <div class="form-group"><label>Branch</label><select id="sf-branch"></select></div>
        <div class="form-group"><label>Role</label><select id="sf-role"><option>Stylist</option><option>Senior Stylist</option><option>Manager</option><option>Assistant</option></select></div>
        <div class="form-group"><label>Mobile</label><input id="sf-mobile" placeholder="9999999999"></div>
        <div class="form-group"><label>Salary (₹)</label><input id="sf-salary" type="number" placeholder="30000"></div>
        <div class="form-group"><label>Join Date</label><input id="sf-join" type="date"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveStaff()">Save Staff</button>
        <button class="btn btn-secondary" onclick="document.getElementById('add-staff-form').style.display='none'">Cancel</button>
        <input type="hidden" id="sf-edit-id" value="">
      </div>
    </div>
    <div class="card"><table id="staff-table"></table></div>
  </div>
</div>

<div class="page" id="page-expenses">
  <div class="tab2">
    <button class="tab2-btn active" onclick="showExpTab('rent',this)">Rent</button>
    <button class="tab2-btn" onclick="showExpTab('elec',this)">Electricity</button>
    <button class="tab2-btn" onclick="showExpTab('wifi',this)">WiFi</button>
    <button class="tab2-btn" onclick="showExpTab('other',this)">Other</button>
  </div>
  <div id="exp-content"></div>
</div>

<div class="page" id="page-pl">
  <div class="kpi-grid" id="pl-kpis"></div>
  <div class="section-title">P&L by Branch</div>
  <div class="card" style="overflow-x:auto"><table id="pl-table"></table></div>
</div>

<div class="page" id="page-settings">
  <div class="form-panel">
    <div class="form-title">Add / Edit Branch</div>
    <div class="form-grid">
      <div class="form-group"><label>Branch Name</label><input id="set-name" placeholder="V-CUT NEW BRANCH"></div>
      <div class="form-group"><label>Type</label><select id="set-type"><option value="mens">Men's Salon</option><option value="unisex">Unisex</option></select></div>
      <div class="form-group"><label>Shop Rent (₹)</label><input id="set-shop-rent" type="number"></div>
      <div class="form-group"><label>Room Rent (₹)</label><input id="set-room-rent" type="number"></div>
      <div class="form-group"><label>Salary Budget (₹)</label><input id="set-salary" type="number"></div>
      <div class="form-group"><label>WiFi Bill (₹)</label><input id="set-wifi" type="number"></div>
      <div class="form-group"><label>Location</label><input id="set-location" placeholder="Bangalore"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveBranchSettings()">Save Branch</button>
      <button class="btn btn-secondary" onclick="clearBranchForm()">Clear</button>
      <input type="hidden" id="set-edit-id" value="">
    </div>
  </div>
  <div class="section-title">All Branches</div>
  <div class="card"><table id="settings-table"></table></div>
  <div class="section-divider"></div>
  <div class="btn-row">
    <button class="btn btn-danger" onclick="resetAllData()">Reset All Data</button>
    <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
    <span style="font-size:11px;color:#666">Data stored in browser localStorage</span>
  </div>
</div>

</div>
</div>
<div class="toast" id="toast"></div>

function load(key,def){try{const d=localStorage.getItem('vcut_'+key);return d?JSON.parse(d):def;}catch(e){return def;}}

function toast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#a32d2d':type==='success'?'#3b6d11':'#1a2b4c';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,7);}
function getBranchById(id){return branches.find(b=>b.id===id);}
function getStaffByBranch(bid){return staff.filter(s=>s.branch_id===bid);}
function getEntriesByBranch(bid){return entries.filter(e=>e.branch_id===bid);}
function branchIncome(bid){return entries.filter(e=>e.branch_id===bid).reduce((s,e)=>s+(e.online||0)+(e.cash||0),0);}
function branchExpenses(bid){
  const b=getBranchById(bid);if(!b)return 0;
  const salary=getStaffByBranch(bid).reduce((s,st)=>s+(st.salary||0),0);
  const incentives=entries.filter(e=>e.branch_id===bid).reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
  const cashExp=entries.filter(e=>e.branch_id===bid).reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.material||0)+(e.petrol||0),0);
  return salary+incentives+cashExp+(b.shop_rent||0)+(b.room_rent||0)+(b.shop_elec||0)+(b.room_elec||0)+(b.wifi||0);
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const renders={dashboard:renderDashboard,branches:renderBranches,entry:renderEntry,staff:renderStaffPage,expenses:()=>renderExpTab('rent'),pl:renderPL,settings:renderSettings};
  if(renders[id])renders[id]();
}

function renderDashboard(){
  const totalInc=branches.reduce((s,b)=>s+branchIncome(b.id),0);
  const totalExp=branches.reduce((s,b)=>s+branchExpenses(b.id),0);
  document.getElementById('dash-kpis').innerHTML=[
    {l:'Total Income',v:INR(totalInc),s:'April 2026',c:'green'},
    {l:'Total Expenses',v:INR(totalExp),s:'All branches',c:'red'},
    {l:'Net P&L',v:totalInc-totalExp<0?'('+INR(totalInc-totalExp)+')':INR(totalInc-totalExp),s:'Loss',c:'red'},
    {l:'Active Branches',v:branches.length,s:'15 locations',c:'blue'},
    {l:'Total Staff',v:staff.length,s:'Across all branches',c:'blue'},
    {l:'Entries Recorded',v:entries.length,s:'Daily records',c:'orange'},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-value ${k.c}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');

  const sorted=[...branches].sort((a,b)=>branchIncome(b.id)-branchIncome(a.id));
  document.getElementById('dash-table').innerHTML=`<thead><tr><th>Branch</th><th class="num">Income</th><th class="num">Expenses</th><th class="num">Net P&L</th><th>Status</th></tr></thead><tbody>
  ${sorted.map(b=>{const inc=branchIncome(b.id),exp=branchExpenses(b.id),net=inc-exp;return `<tr><td style="font-weight:500">${b.name}</td><td class="num">${INR(inc)}</td><td class="num">${INR(exp)}</td><td class="num ${net<0?'red':'green'}" style="font-weight:500">${net<0?'('+INR(net)+')':INR(net)}</td><td><span class="pill ${net>=0?'pill-green':'pill-red'}">${net>=0?'Profit':'Loss'}</span></td></tr>`;}).join('')}
  <tr class="tf"><td>TOTAL</td><td class="num">${INR(totalInc)}</td><td class="num">${INR(totalExp)}</td><td class="num red">(${INR(totalExp-totalInc)})</td><td></td></tr></tbody>`;

  const totSalary=branches.reduce((s,b)=>s+getStaffByBranch(b.id).reduce((ss,st)=>ss+(st.salary||0),0),0);
  const totRent=branches.reduce((s,b)=>s+(b.shop_rent||0)+(b.room_rent||0),0);
  const totElec=branches.reduce((s,b)=>s+(b.shop_elec||0)+(b.room_elec||0),0);
  const totWifi=branches.reduce((s,b)=>s+(b.wifi||0),0);
  const totInc2=entries.reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
  const totCash=entries.reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.material||0)+(e.petrol||0),0);
  const totExp=totSalary+totRent+totElec+totInc2+totWifi+totCash;
  document.getElementById('dash-exp').innerHTML=`<thead><tr><th>Category</th><th class="num">Amount</th><th class="num">% of Exp</th></tr></thead><tbody>
  ${[['Salary',totSalary],['Rent',totRent],['Electricity',totElec],['Incentives',totInc2],['WiFi',totWifi],['Cash/Material',totCash]].map(([cat,amt])=>`<tr><td>${cat}</td><td class="num">${INR(amt)}</td><td class="num">${totExp>0?(amt/totExp*100).toFixed(1):0}%</td></tr>`).join('')}</tbody>`;
}

  const bill=parseFloat(document.getElementById('sb-bill-'+sid)?.value||0);

function saveEntry(){
  const bid=document.getElementById('entry-branch').value;
  const date=document.getElementById('entry-date').value;
  if(!bid||!date){toast('Select branch and date','error');return;}
  const brStaff=getStaffByBranch(bid);
  const online=parseFloat(document.getElementById('ei-online')?.value||0);
  const cash=parseFloat(document.getElementById('ei-cash')?.value||0);
  const material=parseFloat(document.getElementById('ei-material')?.value||0);
  const tips=parseFloat(document.getElementById('ei-tips')?.value||0);
  const others=parseFloat(document.getElementById('ei-others')?.value||0);
  const petrol=parseFloat(document.getElementById('ei-petrol')?.value||0);
  const notes=document.getElementById('ei-notes')?.value||'';
  const staff_billing=brStaff.map(s=>({staff_id:s.id,billing:parseFloat(document.getElementById('sb-bill-'+s.id)?.value||0),incentive:parseFloat(document.getElementById('sb-inc-'+s.id)?.value||0)})).filter(x=>x.billing>0||x.incentive>0);
  const existing=entries.findIndex(e=>e.branch_id===bid&&e.date===date);
  const entry={id:existing>=0?entries[existing].id:uid(),branch_id:bid,date,online,cash,material,tips,others,petrol,notes,staff_billing};
  if(existing>=0){entries[existing]=entry;toast('Entry updated','success');}
  else{entries.push(entry);toast('Entry saved!','success');}
  saveAll();document.getElementById('entry-status').textContent='Saved at '+new Date().toLocaleTimeString();
  renderRecentEntries();
}

}

      const b=getBranchById(s.branch_id);
      const aprInc=entries.filter(e=>e.branch_id===s.branch_id).reduce((sum,e)=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===s.id);return sum+(sb?sb.incentive||0:0);},0);
      return `<tr><td style="color:#666">${i+1}</td><td style="font-weight:500">${s.name}</td><td style="font-size:11px">${b?b.name:'-'}</td><td><span class="pill pill-blue" style="font-size:10px">${s.role}</span></td><td style="font-size:11px">${s.mobile||'-'}</td><td class="num">${INR(s.salary||0)}</td><td class="num green" style="font-weight:500">${INR(aprInc)}</td><td class="num">${s.march_billing?INR(s.march_billing):'-'}</td><td style="display:flex;gap:4px"><button class="btn btn-secondary btn-sm" onclick="editStaff('${s.id}')">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteStaff('${s.id}')">Del</button></td></tr>`;
    }).join('')}</tbody>`;
}

function showAddStaff(){const f=document.getElementById('add-staff-form');f.style.display=f.style.display==='none'?'block':'none';document.getElementById('sf-edit-id').value='';}

function editStaff(sid){
  const s=staff.find(x=>x.id===sid);if(!s)return;
  document.getElementById('sf-name').value=s.name;
  document.getElementById('sf-branch').value=s.branch_id;
  document.getElementById('sf-role').value=s.role;
  document.getElementById('sf-mobile').value=s.mobile||'';
  document.getElementById('sf-salary').value=s.salary||'';
  document.getElementById('sf-join').value=s.join||'';
  document.getElementById('sf-edit-id').value=sid;
  document.getElementById('add-staff-form').style.display='block';
  document.getElementById('add-staff-form').scrollIntoView({behavior:'smooth'});
}

function saveStaff(){
  const name=document.getElementById('sf-name').value.trim();
  const branch_id=document.getElementById('sf-branch').value;
  if(!name||!branch_id){toast('Name and branch required','error');return;}
  const eid=document.getElementById('sf-edit-id').value;
  const s={id:eid||uid(),name,branch_id,role:document.getElementById('sf-role').value,mobile:document.getElementById('sf-mobile').value,salary:parseFloat(document.getElementById('sf-salary').value||0),join:document.getElementById('sf-join').value,march_billing:eid?staff.find(x=>x.id===eid)?.march_billing||0:0};
  if(eid){const idx=staff.findIndex(x=>x.id===eid);staff[idx]=s;}else{staff.push(s);}
  saveAll();document.getElementById('add-staff-form').style.display='none';document.getElementById('sf-name').value='';document.getElementById('sf-edit-id').value='';
  toast(eid?'Staff updated':'Staff added!','success');renderStaffTable();
}

function deleteStaff(sid){
  if(!confirm('Delete this staff member?'))return;
  staff=staff.filter(s=>s.id!==sid);saveAll();toast('Staff removed','error');renderStaffTable();
}

function renderExpTab(tab){
  const el=document.getElementById('exp-content');
  if(tab==='rent'){
    el.innerHTML=`<div class="card" style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Branch</th><th class="num">Shop Rent</th><th class="num">Room Rent</th><th class="num">Total Rent</th><th class="num">Apr Income</th><th class="num">Rent %</th><th>Status</th></tr></thead>
      <tbody>${branches.map((b,i)=>{const t=(b.shop_rent||0)+(b.room_rent||0);const inc=branchIncome(b.id);const pct=inc>0?Math.round(t/inc*100):999;const pc=pct>100?'pill-red':pct>60?'pill-amber':'pill-green';const st=pct>100?'Rent > Income':pct>60?'High':'OK';
        return `<tr><td>${i+1}</td><td style="font-weight:500">${b.name}</td><td class="num">${INR(b.shop_rent||0)}</td><td class="num">${INR(b.room_rent||0)}</td><td class="num" style="font-weight:500">${INR(t)}</td><td class="num">${INR(inc)}</td><td class="num ${pct>100?'red':pct>60?'orange':''}" style="font-weight:500">${pct}%</td><td><span class="pill ${pc}">${st}</span></td></tr>`;}).join('')}
      <tr class="tf"><td colspan="2">TOTAL</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.shop_rent||0),0))}</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.room_rent||0),0))}</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.shop_rent||0)+(b.room_rent||0),0))}</td><td colspan="3"></td></tr></tbody></table></div>`;
  }else if(tab==='elec'){
    el.innerHTML=`<div class="card"><table>
      <thead><tr><th>#</th><th>Branch</th><th class="num">Shop Elec</th><th class="num">Room Elec</th><th class="num">Total</th></tr></thead>
      <tbody>${branches.map((b,i)=>`<tr><td>${i+1}</td><td style="font-weight:500">${b.name}</td>
        <td class="num"><input type="number" value="${b.shop_elec||0}" style="width:90px;text-align:right;padding:5px 7px;border:.5px solid #e0e0e0;border-radius:4px;font-size:12px" onchange="updateBranchField('${b.id}','shop_elec',this.value)"></td>
        <td class="num"><input type="number" value="${b.room_elec||0}" style="width:90px;text-align:right;padding:5px 7px;border:.5px solid #e0e0e0;border-radius:4px;font-size:12px" onchange="updateBranchField('${b.id}','room_elec',this.value)"></td>
        <td class="num" style="font-weight:500">${INR((b.shop_elec||0)+(b.room_elec||0))}</td></tr>`).join('')}
      <tr class="tf"><td colspan="2">TOTAL</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.shop_elec||0),0))}</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.room_elec||0),0))}</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.shop_elec||0)+(b.room_elec||0),0))}</td></tr></tbody></table>
      <div style="padding:10px;font-size:11px;color:#666">Edit values directly — changes save automatically</div></div>`;
  }else if(tab==='wifi'){
    el.innerHTML=`<div class="card"><table>
      <thead><tr><th>#</th><th>Branch</th><th class="num">WiFi Bill (₹)</th><th>Status</th></tr></thead>
      <tbody>${branches.map((b,i)=>`<tr><td>${i+1}</td><td style="font-weight:500">${b.name}</td>
        <td class="num"><input type="number" value="${b.wifi||0}" style="width:90px;text-align:right;padding:5px 7px;border:.5px solid #e0e0e0;border-radius:4px;font-size:12px" onchange="updateBranchField('${b.id}','wifi',this.value)"></td>
        <td><span class="pill ${(b.wifi||0)>0?'pill-green':'pill-amber'}">${(b.wifi||0)>0?'Active':'None'}</span></td></tr>`).join('')}
      <tr class="tf"><td colspan="2">TOTAL</td><td class="num">${INR(branches.reduce((s,b)=>s+(b.wifi||0),0))}</td><td></td></tr></tbody></table></div>`;
  }else{
    el.innerHTML=`<div class="card" style="overflow-x:auto"><table>
      <thead><tr><th>Branch</th><th class="num">Salary</th><th class="num">Incentives</th><th class="num">Rent</th><th class="num">Elec</th><th class="num">WiFi</th><th class="num">Cash/Misc</th><th class="num">TOTAL</th></tr></thead>
      <tbody>${branches.map(b=>{
        const sal=getStaffByBranch(b.id).reduce((s,st)=>s+(st.salary||0),0);
        const inc2=entries.filter(e=>e.branch_id===b.id).reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
        const rent=(b.shop_rent||0)+(b.room_rent||0);const elec=(b.shop_elec||0)+(b.room_elec||0);
        const misc=entries.filter(e=>e.branch_id===b.id).reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.material||0)+(e.petrol||0),0);
        const total=sal+inc2+rent+elec+(b.wifi||0)+misc;
        return `<tr><td style="font-weight:500;white-space:nowrap">${b.name}</td><td class="num">${INR(sal)}</td><td class="num">${INR(inc2)}</td><td class="num">${INR(rent)}</td><td class="num">${INR(elec)}</td><td class="num">${INR(b.wifi||0)}</td><td class="num">${INR(misc)}</td><td class="num" style="font-weight:500">${INR(total)}</td></tr>`;
      }).join('')}</tbody></table></div>`;
  }
}

function showExpTab(tab,btn){
  document.querySelectorAll('#page-expenses .tab2-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderExpTab(tab);
}

function updateBranchField(bid,field,val){
  const b=branches.find(x=>x.id===bid);if(!b)return;
  b[field]=parseFloat(val)||0;saveAll();toast('Saved','success');
}

function renderPL(){
  const totalInc=branches.reduce((s,b)=>s+branchIncome(b.id),0);
  const totalExp=branches.reduce((s,b)=>s+branchExpenses(b.id),0);
  document.getElementById('pl-kpis').innerHTML=[
    {l:'Total Income',v:INR(totalInc),c:'green'},{l:'Total Expenses',v:INR(totalExp),c:'red'},
    {l:'Net P&L',v:'('+INR(totalExp-totalInc)+')',c:'red'},{l:'Revenue Coverage',v:(totalExp>0?(totalInc/totalExp*100).toFixed(1):0)+'%',c:'orange'},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-value ${k.c}">${k.v}</div></div>`).join('');
  document.getElementById('pl-table').innerHTML=`
    <thead><tr><th>#</th><th>Branch</th><th class="num">Income</th><th class="num">Salary</th><th class="num">Incentives</th><th class="num">Rent</th><th class="num">Elec+WiFi</th><th class="num">Other</th><th class="num">Total Exp</th><th class="num">Net P&L</th></tr></thead>
    <tbody>${branches.map((b,i)=>{
      const inc=branchIncome(b.id);
      const sal=getStaffByBranch(b.id).reduce((s,st)=>s+(st.salary||0),0);
      const inc2=entries.filter(e=>e.branch_id===b.id).reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);
      const rent=(b.shop_rent||0)+(b.room_rent||0);
      const elecwifi=(b.shop_elec||0)+(b.room_elec||0)+(b.wifi||0);
      const misc=entries.filter(e=>e.branch_id===b.id).reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.material||0)+(e.petrol||0),0);
      const exp=sal+inc2+rent+elecwifi+misc;const net=inc-exp;
      return `<tr><td style="color:#666">${i+1}</td><td style="font-weight:500;white-space:nowrap">${b.name}</td>
        <td class="num green">${INR(inc)}</td><td class="num">${INR(sal)}</td><td class="num">${INR(inc2)}</td><td class="num">${INR(rent)}</td><td class="num">${INR(elecwifi)}</td><td class="num">${INR(misc)}</td><td class="num">${INR(exp)}</td>
        <td class="num ${net<0?'red':'green'}" style="font-weight:500">${net<0?'('+INR(net)+')':INR(net)}</td></tr>`;
    }).join('')}
    <tr class="tf"><td colspan="2">TOTAL</td><td class="num">${INR(totalInc)}</td><td colspan="6"></td><td class="num red">(${INR(totalExp-totalInc)})</td></tr></tbody>`;
}

function renderSettings(){
  document.getElementById('settings-table').innerHTML=`
    <thead><tr><th>#</th><th>Branch</th><th>Type</th><th class="num">Shop Rent</th><th class="num">Room Rent</th><th class="num">Salary</th><th>Location</th><th></th></tr></thead>
    <tbody>${branches.map((b,i)=>`<tr><td>${i+1}</td><td style="font-weight:500">${b.name}</td><td><span class="pill ${b.type==='unisex'?'pill-blue':'pill-amber'}">${b.type}</span></td><td class="num">${INR(b.shop_rent||0)}</td><td class="num">${INR(b.room_rent||0)}</td><td class="num">${INR(getStaffByBranch(b.id).reduce((s,st)=>s+(st.salary||0),0))}</td><td>${b.location||'-'}</td><td><button class="btn btn-secondary btn-sm" onclick="editBranch('${b.id}')">Edit</button></td></tr>`).join('')}</tbody>`;
}

function editBranch(bid){
  const b=getBranchById(bid);if(!b)return;
  document.getElementById('set-name').value=b.name;
  document.getElementById('set-type').value=b.type;
  document.getElementById('set-shop-rent').value=b.shop_rent||'';
  document.getElementById('set-room-rent').value=b.room_rent||'';
  document.getElementById('set-salary').value=b.salary_budget||'';
  document.getElementById('set-wifi').value=b.wifi||'';
  document.getElementById('set-location').value=b.location||'';
  document.getElementById('set-edit-id').value=bid;
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveBranchSettings(){
  const name=document.getElementById('set-name').value.trim();
  if(!name){toast('Branch name required','error');return;}
  const eid=document.getElementById('set-edit-id').value;
  const data={name,type:document.getElementById('set-type').value,shop_rent:parseFloat(document.getElementById('set-shop-rent').value||0),room_rent:parseFloat(document.getElementById('set-room-rent').value||0),salary_budget:parseFloat(document.getElementById('set-salary').value||0),wifi:parseFloat(document.getElementById('set-wifi').value||0),location:document.getElementById('set-location').value};
  if(eid){const b=branches.find(x=>x.id===eid);Object.assign(b,data);}
  else{branches.push({id:uid(),shop_elec:0,room_elec:0,gst_pct:5,...data});}
  saveAll();clearBranchForm();toast(eid?'Branch updated':'Branch added!','success');renderSettings();
}

function clearBranchForm(){document.getElementById('set-name').value='';document.getElementById('set-edit-id').value='';['set-shop-rent','set-room-rent','set-salary','set-wifi','set-location'].forEach(id=>{document.getElementById(id).value='';});}

function resetAllData(){
  if(!confirm('Reset ALL data to defaults? This cannot be undone!'))return;
  branches=JSON.parse(JSON.stringify(DEFAULT_BRANCHES));
  staff=JSON.parse(JSON.stringify(DEFAULT_STAFF));
  entries=JSON.parse(JSON.stringify(DEFAULT_ENTRIES));
  saveAll();toast('Data reset to defaults','error');renderSettings();
}

function exportData(){
  const data={branches,staff,entries,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='vcut_data_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);toast('Data exported!','success');
}

renderDashboard();
</script>
</body>
</html>
