<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-CUT Group — Management System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--bg5:#2c2c2c;
  --gold:#c9a83c;--gold2:#e8c84e;--gold3:#f5e27a;--gold-dim:#8a6f22;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --red:#e05252;--green:#4caf6e;--orange:#d4883a;--blue:#5b9bd5;
  --red-bg:#2a1515;--green-bg:#0f2a1a;--orange-bg:#2a1d0a;--blue-bg:#0f1e2a;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#1c1400 0%,var(--bg) 70%)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:32px;font-weight:700;color:var(--gold);letter-spacing:4px;text-shadow:0 0 40px rgba(201,168,60,.3)}
.login-logo p{font-size:12px;color:var(--text3);margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.login-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto}
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:560px;width:100%;margin-bottom:24px}
@media(max-width:480px){.role-cards{grid-template-columns:1fr}}
.role-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--gold-dim);background:var(--bg4)}
.role-card.selected{border:1.5px solid var(--gold);background:var(--bg4);box-shadow:0 0 20px rgba(201,168,60,.15)}
.role-icon{font-size:28px;margin-bottom:8px}
.role-name{font-size:13px;font-weight:600;color:var(--gold)}
.role-desc{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.5}
.login-box{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:24px;max-width:300px;width:100%}
.login-box h3{font-size:15px;font-weight:500;margin-bottom:3px;color:var(--gold)}
.login-box p{font-size:11px;color:var(--text3);margin-bottom:16px}
.lg{margin-bottom:11px}
.lg label{font-size:10px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.lg input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--bg4);color:var(--text);transition:border .2s}
.lg input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:11px;background:var(--gold);color:#0d0d0d;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s}
.login-btn:hover{background:var(--gold2)}
.login-err{font-size:11px;color:var(--red);text-align:center;margin-top:10px;display:none}
.login-err.show{display:block}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);color:var(--text);padding:0 16px;display:flex;align-items:center;gap:10px;height:52px;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px}
.tb-sep{width:1px;height:20px;background:var(--border2)}
.tb-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase}
.tb-admin{background:var(--gold);color:#0d0d0d}
.tb-accountant{background:#1e3a2f;color:#4caf6e;border:1px solid #2a5040}
.tb-employee{background:#1a2a3a;color:#5b9bd5;border:1px solid #1e3a5a}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.user-chip{font-size:11px;color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sync-dot.offline{background:var(--red);animation:none}
.sync-dot.syncing{background:var(--gold);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:4px;background:var(--bg4);color:var(--text2);border:1px solid var(--border2);cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--gold);color:var(--gold)}

.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 6px}
.nav::-webkit-scrollbar{height:2px}.nav::-webkit-scrollbar-thumb{background:var(--gold)}
.nb{padding:14px 14px;font-size:12px;color:var(--text3);cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.2px}
.nb.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
.nb:hover:not(.active){color:var(--text)}

.content{flex:1;padding:16px;max-width:1400px;width:100%;margin:0 auto}
.page{display:none}.page.active{display:block}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.page-title{font-size:15px;font-weight:600;color:var(--gold);letter-spacing:.5px}
.refresh-btn{padding:5px 12px;font-size:11px;background:var(--bg4);color:var(--text2);border:1px solid var(--border2);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
.refresh-btn:active .ri{animation:spin .4s linear}
.ri{display:inline-block;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}

.kpi-v{font-size:20px;font-weight:600;color:var(--text)}
.kpi-s{font-size:10px;color:var(--text3);margin-top:3px}
.red{color:var(--red)}.green{color:var(--green)}.orange{color:var(--orange)}.blue{color:var(--blue)}
.gold{color:var(--gold)}

.st{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg4);color:var(--text2);font-weight:500;font-size:10px;padding:8px 11px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg4)}
.tf td{background:var(--bg4);font-weight:600;color:var(--gold)}
.num{text-align:right}
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.3px}
.pr{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,82,82,.2)}
.pg{background:var(--green-bg);color:var(--green);border:1px solid rgba(76,175,110,.2)}
.pa{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(212,136,58,.2)}
.pb{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,155,213,.2)}
.pt{background:#0a1e14;color:#4caf6e;border:1px solid rgba(76,175,110,.2)}
.pp{background:#170e2a;color:#a47fd4;border:1px solid rgba(164,127,212,.2)}
.pgold{background:#1c1500;color:var(--gold);border:1px solid rgba(201,168,60,.2)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
.sec-div{height:1px;background:var(--border);margin:12px 0}

.form-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.form-title{font-size:11px;font-weight:600;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid var(--border2);border-radius:6px;font-size:12px;background:var(--bg4);color:var(--text);width:100%;transition:border .2s}

.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fg select option{background:var(--bg4);color:var(--text)}

.btn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;border:none;transition:all .15s;letter-spacing:.2px}
.btn-p{background:var(--gold);color:#0d0d0d}.btn-p:hover{background:var(--gold2)}
.btn-s{background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}.btn-s:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,82,82,.3)}.btn-d:hover{background:#3a1515}
.btn-g{background:var(--green-bg);color:var(--green);border:1px solid rgba(76,175,110,.3)}.btn-g:hover{background:#173a22}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

.tab2{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.t2b{padding:5px 12px;font-size:11px;border:1px solid var(--border2);border-radius:5px;cursor:pointer;background:none;color:var(--text3);transition:all .15s}
.t2b.active{background:var(--gold);color:#0d0d0d;border-color:var(--gold);font-weight:600}
.t2b:hover:not(.active){border-color:var(--gold-dim);color:var(--text)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--gold);color:var(--text);padding:10px 16px;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:280px}
.toast.show{opacity:1}
.hidden-val{filter:blur(4px);user-select:none;pointer-events:none;display:inline-block}

.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.bcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
.bcard:hover{border-color:var(--gold-dim);box-shadow:0 4px 20px rgba(201,168,60,.1)}
.bcard-head{background:var(--bg4);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--gold)}
.bcard-body{padding:10px 12px}
.br{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.br:last-child{border-bottom:none}
.bl{color:var(--text3)}

.detail-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}

.target-bar{height:6px;background:var(--bg5);border-radius:3px;overflow:hidden;margin-top:4px}
.target-fill{height:100%;border-radius:3px;background:var(--green)}

.leave-status{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}
.ls-pending{background:var(--orange-bg);color:var(--orange)}
.ls-approved{background:var(--green-bg);color:var(--green)}
.ls-rejected{background:var(--red-bg);color:var(--red)}

/* Transaction badge */
.txn-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;background:#1c1200;color:var(--gold);border:1px solid rgba(201,168,60,.3);letter-spacing:.3px}

/* Gold separator */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0;opacity:.3}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">
    <h1>✂ V-CUT GROUP</h1>
    <div class="login-divider"></div>
    <p>Salon Management System · Bangalore</p>
  </div>
  <div class="role-cards">
    <div class="role-card" id="rc-admin" data-role="admin">
      <div class="role-icon">👑</div>
      <div class="role-name">Admin</div>
      <div class="role-desc">Full access · Salary · Rent · All reports</div>
    </div>
    <div class="role-card" id="rc-accountant" data-role="accountant">
      <div class="role-icon">📊</div>
      <div class="role-name">Accountant</div>

    </div>
    <div class="role-card" id="rc-employee" data-role="employee">
      <div class="role-icon">✂️</div>
      <div class="role-name">Employee</div>
      <div class="role-desc">My target · Leaderboard · Roster · Leave</div>
    </div>
  </div>
  <div class="login-box" id="loginBox" style="display:none">
    <h3 id="loginTitle">Login</h3>

    <div class="lg"><label>User ID</label><input type="text" id="loginUser" placeholder="e.g. admin001" autocomplete="username"></div>
    <div class="lg"><label>Password</label><input type="password" id="loginPass" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" id="loginBtn">Login</button>
    <div class="login-err" id="loginErr">Incorrect User ID or password</div>

  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
<div class="app">
  <div class="topbar">
    <h1>V-CUT GROUP</h1>
    <span class="tb-badge" id="roleBadge"></span>
    <span class="user-chip" id="userChip"></span>
    <div class="tb-right">
      <span class="sync-dot" id="syncDot"></span>
      <span style="font-size:10px;opacity:.6" id="syncLabel">Connecting...</span>
      <button class="logout-btn" id="logoutBtnEl" onclick="if(window.doLogout)window.doLogout()">Logout</button>
    </div>

  <div class="content" id="mainContent"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// Bridge script: safely connects HTML elements to module functions
// Runs after DOM is ready, delegates to window.* functions set by module
document.addEventListener('DOMContentLoaded', function(){
  // Role card clicks
  document.querySelectorAll('.role-card[data-role]').forEach(function(card){
    card.addEventListener('click', function(){
      if(window.selectRole) window.selectRole(card.dataset.role);
    });
  });
  // Login button
  var loginBtn = document.getElementById('loginBtn');
  if(loginBtn) loginBtn.addEventListener('click', function(){
    if(window.doLogin) window.doLogin();
  });
  // Login on Enter key
  var passInput = document.getElementById('loginPass');
  if(passInput) passInput.addEventListener('keydown', function(e){
    if(e.key==='Enter' && window.doLogin) window.doLogin();
  });
  // Logout button (delegated since it's in dynamic HTML)
  document.addEventListener('click', function(e){
    if(e.target && e.target.id==='logoutBtnEl' && window.doLogout) window.doLogout();
  });
});
</script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import{getFirestore,collection,doc,getDocs,setDoc,addDoc,deleteDoc,updateDoc,onSnapshot,query,orderBy}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const FB={apiKey:"AIzaSyDmGhRW3CAIydXCKRTgrAh1xg2_t9-nhgI",authDomain:"v-cut-8e496.firebaseapp.com",projectId:"v-cut-8e496",storageBucket:"v-cut-8e496.firebasestorage.app",messagingSenderId:"279998839455",appId:"1:279998839455:web:fa71333bfb7ed33b4440aa"};

const DEFAULTS_USERS=[
  {id:'admin001',name:'Owner',role:'admin',password:'VCut@2026',branch_id:'all'},
  {id:'acc001',name:'Accounts Manager',role:'accountant',password:'Acc@1234',branch_id:'all'},
  {id:'emp001',name:'SANDY©',role:'employee',password:'Sandy@123',branch_id:'dlf',staff_id:'s1'},
  {id:'emp002',name:'FURKAN',role:'employee',password:'Furkan@123',branch_id:'dlfu',staff_id:'s27'},
  {id:'emp003',name:'AARIF©',role:'employee',password:'Aarif@123',branch_id:'arek',staff_id:'s8'},
  {id:'emp004',name:'ALEEM',role:'employee',password:'Aleem@123',branch_id:'vij',staff_id:'s11'},
  {id:'emp005',name:'ZULFEE',role:'employee',password:'Zulfee@123',branch_id:'harl',staff_id:'s20'},
];

const INR=v=>'&#8377;'+Math.abs(Math.round(v||0)).toLocaleString('en-IN');
const MASK='<span class="hidden-val">&#9679;&#9679;&#9679;&#9679;&#9679;</span>';
const uid2=()=>'id'+Date.now()+Math.random().toString(36).slice(2,6);

let db,branches=[],staff=[],entries=[],users=[],leaves=[],transactions=[],expenseTypes=[];
let currentUser=null,currentRole=null,selectedRole=null;
let currentExpTab='txn',unsubs=[];

function toast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#a32d2d':type==='success'?'#3b6d11':'#1a2b4c';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
window.toast=toast;

function selectRole(role){
  selectedRole=role;
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('rc-'+role).classList.add('selected');
  document.getElementById('loginBox').style.display='block';
  const titles={admin:'Admin Login',accountant:'Accountant Login',employee:'Employee Login'};
  const subs={admin:'Full access to all financial data',accountant:'Manage daily sales and staff',employee:'View your performance and apply leave'};
  document.getElementById('loginTitle').textContent=titles[role];
  document.getElementById('loginSub').textContent=subs[role];
  document.getElementById('loginUser').focus();
  document.getElementById('loginErr').classList.remove('show');
}
window.selectRole=selectRole;

async function doLogin(){
  const uid=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!uid||!pass){document.getElementById('loginErr').classList.add('show');return;}
  // Try Firebase users first, then built-in defaults
  // This handles case where user was added via Firebase (like vipin0845)
  let allUsers=[...DEFAULTS_USERS];
  if(users.length>0){
    // Merge: Firebase users take priority over defaults with same ID
    users.forEach(fu=>{const idx=allUsers.findIndex(u=>u.id===fu.id);if(idx>=0)allUsers[idx]=fu;else allUsers.push(fu);});
  }
  const user=allUsers.find(u=>u.id===uid&&u.password===pass&&u.role===selectedRole);
  if(!user){document.getElementById('loginErr').classList.add('show');return;}
  currentUser=user;currentRole=user.role;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  const bc={admin:'tb-admin',accountant:'tb-accountant',employee:'tb-employee'};
  document.getElementById('roleBadge').textContent=currentRole.toUpperCase();
  document.getElementById('roleBadge').className='tb-badge '+bc[currentRole];
  document.getElementById('userChip').textContent=user.name;
  await connectFB();buildNav();showFirstPage();
}
window.doLogin=doLogin;

function doLogout(){
  unsubs.forEach(u=>u());unsubs=[];
  branches=[];staff=[];entries=[];users=[];leaves=[];
  currentUser=null;currentRole=null;selectedRole=null;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('loginBox').style.display='none';
}
window.doLogout=doLogout;

async function connectFB(){
  setSS('syncing');
  try{
    const app=initializeApp(FB,currentUser.id+Date.now());
    db=getFirestore(app);
    await seed();subscribeAll();
  }catch(e){setSS('offline');toast('Firebase: '+e.message,'error');}
}

function setSS(s){
  const d=document.getElementById('syncDot');const l=document.getElementById('syncLabel');
  if(!d)return;
  d.className='sync-dot'+(s==='offline'?' offline':s==='syncing'?' syncing':'');
  l.textContent=s==='online'?'Live':s==='syncing'?'Syncing...':'Offline';
}

async function seed(){
  const bs=await getDocs(collection(db,'branches'));
  if(bs.empty){
    const db2=[

function subscribeAll(){
  unsubs.forEach(u=>u());unsubs=[];
  unsubs.push(onSnapshot(collection(db,'branches'),sn=>{branches=sn.docs.map(d=>({...d.data(),id:d.id}));setSS('online');refresh();}));
  unsubs.push(onSnapshot(collection(db,'staff'),sn=>{staff=sn.docs.map(d=>({...d.data(),id:d.id}));refresh();}));
  unsubs.push(onSnapshot(query(collection(db,'entries'),orderBy('date','desc')),sn=>{entries=sn.docs.map(d=>({...d.data(),id:d.id}));refresh();},e=>console.error(e)));
  unsubs.push(onSnapshot(collection(db,'users'),sn=>{users=sn.docs.map(d=>({...d.data(),id:d.id}));}));
  unsubs.push(onSnapshot(collection(db,'leaves'),sn=>{leaves=sn.docs.map(d=>({...d.data(),id:d.id}));refresh();}));
  unsubs.push(onSnapshot(query(collection(db,'transactions'),orderBy('month','desc')),sn=>{transactions=sn.docs.map(d=>({...d.data(),id:d.id}));refresh();},e=>console.error(e)));
  unsubs.push(onSnapshot(collection(db,'expense_types'),sn=>{expenseTypes=sn.docs.map(d=>({...d.data(),id:d.id}));refresh();},e=>console.error(e)));
}

const bEnt=bid=>entries.filter(e=>e.branch_id===bid);
const bExp=bid=>{const b=branches.find(x=>x.id===bid);if(!b)return 0;const sal=bSt(bid).reduce((s,st)=>s+(st.salary||0),0);const inc=entries.filter(e=>e.branch_id===bid).reduce((s,e)=>s+(e.staff_billing||[]).reduce((ss,sb)=>ss+(sb.incentive||0),0),0);const cash=entries.filter(e=>e.branch_id===bid).reduce((s,e)=>s+(e.tips||0)+(e.others||0)+(e.material||0)+(e.petrol||0),0);const txnTotal=transactions.filter(t=>t.branch_id===bid).reduce((s,t)=>s+(t.amount||0),0);return sal+inc+cash+txnTotal+(b.shop_rent||0)+(b.room_rent||0)+(b.shop_elec||0)+(b.room_elec||0)+(b.wifi||0)+(b.water||0);};
const sInc=sid=>entries.reduce((sum,e)=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===sid);return sum+(sb?sb.incentive||0:0);},0);

// Last month billing/incentive for a staff member
function lastMonthData(sid){
  const now=new Date();
  const lmYear=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
  const lmMonth=now.getMonth()===0?12:now.getMonth(); // 1-based
  const prefix=lmYear+'-'+String(lmMonth).padStart(2,'0');
  const lmEntries=entries.filter(e=>e.date&&e.date.startsWith(prefix));
  let billing=0,incentive=0;
  lmEntries.forEach(e=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===sid);if(sb){billing+=(sb.billing||0);incentive+=(sb.incentive||0);}});
  return {billing,incentive,achieved:billing};
}

}

async function saveE(){
  const bid=document.getElementById('e-branch').value,date=document.getElementById('e-date').value;
  if(!bid||!date){toast('Select branch and date','error');return;}
  const statusEl=document.getElementById('e-status');
  statusEl.textContent='Saving...';statusEl.style.color='#854f0b';
  const brS=bSt(bid);
  const sb=brS.map(s=>({staff_id:s.id,name:s.name,billing:parseFloat(document.getElementById('sb-b-'+s.id)?.value||0),incentive:parseFloat(document.getElementById('sb-i-'+s.id)?.value||0)})).filter(x=>x.billing>0||x.incentive>0);
  const entry={branch_id:bid,date,online:parseFloat(document.getElementById('ei-on')?.value||0),cash:parseFloat(document.getElementById('ei-cash')?.value||0),material:parseFloat(document.getElementById('ei-mat')?.value||0),tips:parseFloat(document.getElementById('ei-tips')?.value||0),others:parseFloat(document.getElementById('ei-oth')?.value||0),petrol:parseFloat(document.getElementById('ei-pet')?.value||0),notes:document.getElementById('ei-notes')?.value||'',staff_billing:sb,saved_by:currentUser.id,saved_at:new Date().toISOString()};
  try{
    const ex=entries.find(e=>e.branch_id===bid&&e.date===date);
    if(ex){await setDoc(doc(db,'entries',ex.id),entry);console.log('Updated entry',ex.id);}
    else{const ref=await addDoc(collection(db,'entries'),entry);console.log('Added entry',ref.id);}
    statusEl.innerHTML='&#10003; Saved at '+new Date().toLocaleTimeString();
    statusEl.style.color='#3b6d11';
    toast('Entry saved to Firebase!','success');
  }catch(e){
    console.error('saveE error:',e);
    statusEl.textContent='Error: '+e.message;statusEl.style.color='#a32d2d';
    if(e.code==='permission-denied'){
      toast('Firebase permission denied — update Firestore rules!','error');
      showFirebaseRulesHelp();
    } else {
      toast('Save failed: '+e.message,'error');
    }
  }
}

function eSt(sid){
  const s=staff.find(x=>x.id===sid);if(!s)return;
  document.getElementById('sf-name').value=s.name||'';
  document.getElementById('sf-branch').value=s.branch_id||'';
  document.getElementById('sf-role').value=s.role||ROLES[0];
  document.getElementById('sf-mobile').value=s.mobile||'';
  if(isAdm()){
    document.getElementById('sf-sal').value=s.salary||'';
    document.getElementById('sf-inc-pct').value=s.incentive_pct!==undefined?s.incentive_pct:10;
  }
  document.getElementById('sf-tgt').value=s.target||'';
  document.getElementById('sf-join').value=s.join||'';

  document.getElementById('sf-form').style.display='block';

}

async function saveSt(){
  const name=document.getElementById('sf-name').value.trim();
  const bid=document.getElementById('sf-branch').value;
  if(!name||!bid){toast('Name and branch required','error');return;}
  const eid=document.getElementById('sf-eid').value;
  const ex=eid?staff.find(x=>x.id===eid):null;
  const s={
    name,branch_id:bid,
    role:document.getElementById('sf-role').value,
    mobile:document.getElementById('sf-mobile').value,
    target:parseFloat(document.getElementById('sf-tgt').value||0),
    join:document.getElementById('sf-join').value,
    salary:isAdm()?parseFloat(document.getElementById('sf-sal').value||0):(ex?ex.salary||0:0),
    incentive_pct:isAdm()?parseFloat(document.getElementById('sf-inc-pct').value||10):(ex?ex.incentive_pct!==undefined?ex.incentive_pct:10:10),
  };
  try{
    if(eid) await setDoc(doc(db,'staff',eid),s,{merge:true});
    else await addDoc(collection(db,'staff'),s);
    document.getElementById('sf-form').style.display='none';
    document.getElementById('sf-name').value='';
    document.getElementById('sf-eid').value='';
    toast(eid?'Staff updated!':'Staff added!','success');
  }catch(e){
    console.error('saveSt:',e);
    if(e.code==='permission-denied') showFirebaseRulesHelp();
    else toast('Error: '+e.message,'error');
  }
}
window.saveSt=saveSt;

// Salary setup functions
function recalcBranchTotal(bid){
  const bStaff=staff.filter(s=>s.branch_id===bid);
  // Also check if any staff in other inputs has been reassigned to this branch
  const allInputStaff=staff.filter(s=>{
    const sel=document.getElementById('sal-branch-'+s.id);
    return sel && sel.value===bid;
  });
  const uniqueIds=[...new Set([...bStaff.map(s=>s.id),...allInputStaff.map(s=>s.id)])];
  let total=0;
  uniqueIds.forEach(sid=>{
    const inp=document.getElementById('sal-amt-'+sid);
    if(inp) total+=parseFloat(inp.value||0);
  });
  const el=document.getElementById('sal-total-'+bid);
  if(el) el.textContent='\u20B9'+Math.round(total).toLocaleString('en-IN');
}
window.recalcBranchTotal=recalcBranchTotal;

async function saveBranchSalaries(bid){
  const bStaff=staff.filter(s=>s.branch_id===bid);
  let branchTotal=0;
  const updates=[];
  // Save each staff member's salary, target and branch assignment
  for(const s of bStaff){
    const salEl=document.getElementById('sal-amt-'+s.id);
    const tgtEl=document.getElementById('sal-tgt-'+s.id);
    const brEl=document.getElementById('sal-branch-'+s.id);
    if(!salEl) continue;
    const salary=parseFloat(salEl.value||0);
    const target=parseFloat(tgtEl?.value||0);
    const newBranch=brEl?brEl.value:s.branch_id;
    branchTotal+=salary;
    updates.push({id:s.id,salary,target,branch_id:newBranch});
  }
  try{
    // Save each staff salary
    for(const u of updates){
      await setDoc(doc(db,'staff',u.id),{salary:u.salary,target:u.target,branch_id:u.branch_id},{merge:true});
    }
    // Auto-update branch salary_budget = sum of all staff salaries in this branch
    await setDoc(doc(db,'branches',bid),{salary_budget:branchTotal},{merge:true});
    toast(`Salaries saved! Budget auto-set to ${INR(branchTotal)}`, 'success');
  }catch(e){
    console.error(e);
    if(e.code==='permission-denied') showFirebaseRulesHelp();
    else toast('Error: '+e.message,'error');
  }
}
window.saveBranchSalaries=saveBranchSalaries;

  </div>
  <div class="st">Branches I have worked at</div>
  ${workedBranches.length?`<div class="branch-grid">${workedBranches.map(b=>{const myEnt=entries.filter(e=>e.branch_id===b.id&&(e.staff_billing||[]).some(sb=>sb.staff_id===ms.id));const myTot=myEnt.reduce((s,e)=>{const sb=(e.staff_billing||[]).find(x=>x.staff_id===ms.id);return s+(sb?sb.billing||0:0);},0);return`<div class="bcard"><div class="bcard-head"><span>${b.name}</span><span class="pill ${b.id===ms.branch_id?'pg':'pb'}">${b.id===ms.branch_id?'Current':'Past'}</span></div><div class="bcard-body"><div class="br"><span class="bl">Days worked</span><span>${myEnt.length}</span></div><div class="br"><span class="bl">Total billing</span><span class="green" style="font-weight:500">${INR(myTot)}</span></div><div class="br"><span class="bl">Location</span><span>${b.location||'Bangalore'}</span></div></div></div>`;}).join('')}</div>`:'<div class="form-panel" style="color:#666;font-size:12px">No work history recorded yet. Entries will appear here once your billing is logged.</div>'}`;
}

function rRoster(){
  const el=document.getElementById('page-roster');if(!el)return;
  const ms=staff.find(s=>s.id===currentUser.staff_id);
  if(!ms){el.innerHTML='<div class="form-panel"><p style="color:#666;font-size:12px">Staff profile not linked.</p></div>';return;}
  const now=new Date(),year=now.getFullYear(),month=now.getMonth(),dim=new Date(year,month+1,0).getDate(),fd=new Date(year,month,1).getDay();
  const mName=now.toLocaleString('default',{month:'long'});
  const appL=new Set(leaves.filter(l=>l.staff_id===ms.id&&l.status==='approved').map(l=>l.date));
  const worked=new Set(entries.filter(e=>(e.staff_billing||[]).some(sb=>sb.staff_id===ms.id)).map(e=>e.date));
  const todayStr=now.toISOString().slice(0,10);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cal=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">${days.map(d=>`<div style="text-align:center;font-size:10px;color:#666;padding:3px">${d}</div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
  for(let i=0;i<fd;i++)cal+=`<div></div>`;
  for(let d=1;d<=dim;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isT=ds===todayStr,isL=appL.has(ds),isW=worked.has(ds),past=new Date(ds)<=now;let bg=past?'#f0f4fa':'#fff',color='#111',lbl='';if(isL){bg='#fcebeb';color='#a32d2d';lbl='Leave';}else if(isW){bg='#E1F5EE';color='#085041';lbl='Work';}cal+=`<div style="background:${bg};color:${color};border-radius:6px;padding:5px 3px;text-align:center;font-size:11px;border:${isT?'2px solid #1a2b4c':'.5px solid #e0e0e0'}"><div style="font-weight:500">${d}</div><div style="font-size:9px">${lbl}</div></div>`;}cal+='</div>';
  el.innerHTML=`<div class="st">${mName} ${year} &mdash; Roster</div>
  <div class="form-panel">${cal}</div>
  <div style="display:flex;gap:14px;font-size:11px;margin-bottom:14px;flex-wrap:wrap">
    <span><span style="display:inline-block;width:12px;height:12px;background:#E1F5EE;border-radius:2px;vertical-align:middle;margin-right:4px"></span>Worked</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:#fcebeb;border-radius:2px;vertical-align:middle;margin-right:4px"></span>Approved leave</span>
    <span><span style="display:inline-block;width:12px;height:12px;border:2px solid #1a2b4c;border-radius:2px;vertical-align:middle;margin-right:4px"></span>Today</span>
  </div>
  <div class="kpi-grid" style="max-width:400px">
    <div class="kpi"><div class="kpi-l">Days Worked</div><div class="kpi-v green">${worked.size}</div></div>
    <div class="kpi"><div class="kpi-l">Approved Leaves</div><div class="kpi-v orange">${appL.size}</div></div>
    <div class="kpi"><div class="kpi-l">Pending</div><div class="kpi-v blue">${leaves.filter(l=>l.staff_id===ms.id&&l.status==='pending').length}</div></div>
  </div>`;
}

function rApplyLeave(){
  const el=document.getElementById('page-apply-leave');if(!el)return;
  const ms=staff.find(s=>s.id===currentUser.staff_id);
  if(!ms){el.innerHTML='<div class="form-panel"><p style="color:#666;font-size:12px">Staff profile not linked. Contact admin to link your account.</p></div>';return;}
  const myL=leaves.filter(l=>l.staff_id===ms.id).sort((a,b)=>(b.applied_on||'').localeCompare(a.applied_on||''));
  el.innerHTML=`<div class="form-panel">
    <div class="form-title">Apply for Leave</div>
    <div class="form-grid">
      <div class="fg"><label>Leave Date</label><input type="date" id="lv-date" min="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Number of Days</label><input type="number" id="lv-days" value="1" min="1" max="30"></div>
      <div class="fg"><label>Leave Type</label><select id="lv-type"><option>Sick Leave</option><option>Personal Leave</option><option>Family Emergency</option><option>Festival</option><option>Other</option></select></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label>Reason (required)</label><textarea id="lv-reason" placeholder="Please describe the reason for your leave..."></textarea></div>
    <div class="btn-row"><button class="btn btn-p" onclick="applyLv()">Submit Leave Request</button></div>
  </div>
  <div class="st">My Leave History</div>
  <div class="card"><table><thead><tr><th>Date</th><th>Days</th><th>Type</th><th>Reason</th><th>Applied</th><th>Status</th><th></th></tr></thead>
  <tbody>${myL.map(l=>`<tr><td>${l.date||''}</td><td>${l.days||1}</td><td style="font-size:11px">${l.type||'Leave'}</td><td style="font-size:11px;max-width:120px">${l.reason||''}</td><td style="font-size:11px">${l.applied_on?l.applied_on.slice(0,10):''}</td><td><span class="leave-status ls-${l.status}">${l.status}</span></td><td>${l.status==='pending'?`<button class="btn btn-d btn-sm" onclick="cancelLv('${l.id}')">Cancel</button>`:''}</td></tr>`).join('')||'<tr><td colspan="7" style="text-align:center;padding:16px;color:#666">No leave history</td></tr>'}</tbody></table></div>`;
}
async function applyLv(){
  const ms=staff.find(s=>s.id===currentUser.staff_id);if(!ms)return;
  const date=document.getElementById('lv-date').value,reason=document.getElementById('lv-reason').value.trim(),days=parseInt(document.getElementById('lv-days').value)||1,type=document.getElementById('lv-type').value;
  if(!date||!reason){toast('Date and reason are required','error');return;}
  const lv={staff_id:ms.id,staff_name:ms.name,branch_id:ms.branch_id,date,days,type,reason,status:'pending',applied_on:new Date().toISOString(),applied_by:currentUser.id};
  try{await addDoc(collection(db,'leaves'),lv);toast('Leave request submitted!','success');rApplyLeave();}catch(e){console.error('applyLv:',e);if(e.code==='permission-denied')showFirebaseRulesHelp();else toast('Error: '+e.message,'error');}
}
async function cancelLv(lid){if(!confirm('Cancel this leave request?'))return;await deleteDoc(doc(db,'leaves',lid));toast('Cancelled','error');}
window.applyLv=applyLv;window.cancelLv=cancelLv;

// ── MONTHLY TRANSACTIONS ─────────────────────────────────────────────────────
async function saveTxn(month){
  const branch_id=document.getElementById('txn-branch').value;
  const type=document.getElementById('txn-type').value;
  const amount=parseFloat(document.getElementById('txn-amount').value||0);
  const date=document.getElementById('txn-date').value;
  const note=document.getElementById('txn-note').value;
  if(!branch_id||!amount){toast('Branch and amount required','error');return;}
  const txn={branch_id,type,amount,date,note,month,added_by:currentUser.id,added_at:new Date().toISOString()};
  try{
    await addDoc(collection(db,'transactions'),txn);
    document.getElementById('txn-amount').value='';
    document.getElementById('txn-note').value='';
    toast('Transaction saved!','success');
  }catch(e){console.error(e);if(e.code==='permission-denied')showFirebaseRulesHelp();else toast('Error: '+e.message,'error');}
}
window.saveTxn=saveTxn;

async function delTxn(tid){
  if(!confirm('Delete this transaction?'))return;
  try{await deleteDoc(doc(db,'transactions',tid));toast('Deleted','error');}
  catch(e){toast('Error: '+e.message,'error');}
}
window.delTxn=delTxn;

function showFirebaseRulesHelp(){
  const msg = document.createElement('div');
  msg.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  msg.innerHTML=`<div style="background:#fff;border-radius:14px;padding:24px;max-width:480px;width:100%">
    <h3 style="font-size:16px;color:#a32d2d;margin-bottom:10px">Firebase Permission Denied</h3>
    <p style="font-size:12px;color:#666;line-height:1.7;margin-bottom:14px">Your Firestore security rules are blocking writes. Fix it in 3 steps:</p>
    <div style="background:#f0f4fa;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;margin-bottom:14px">
      <strong style="color:#1a2b4c">Step 1:</strong> Go to <strong>console.firebase.google.com</strong><br>
      <strong style="color:#1a2b4c">Step 2:</strong> Open your project → <strong>Firestore Database</strong> → <strong>Rules</strong> tab<br>
      <strong style="color:#1a2b4c">Step 3:</strong> Replace ALL the rules with this and click <strong>Publish</strong>:<br>
      <code style="display:block;background:#1a2b4c;color:#c9a83c;padding:10px;border-radius:6px;margin-top:8px;font-size:11px">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}</code>
    </div>
    <button onclick="this.parentElement.parentElement.remove()" style="width:100%;padding:10px;background:#1a2b4c;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">Got it — I'll fix the rules</button>
  </div>`;
  document.body.appendChild(msg);
}
window.showFirebaseRulesHelp=showFirebaseRulesHelp;
</script>
</body>
